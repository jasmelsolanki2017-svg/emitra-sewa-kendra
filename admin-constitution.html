<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>भारतीय संविधान Manager | E-MITRA WALA</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f8fd;color:#172033;font-family:Poppins,'Noto Sans Devanagari',sans-serif}.topbar{background:#043a76;color:#fff;padding:7px 4%;display:flex;justify-content:space-between;gap:10px}.hero{background:linear-gradient(135deg,#0057a8,#03224d);color:#fff;text-align:center;padding:20px 4%;border-bottom:3px solid #ff7a00}.hero h1{margin:0;color:#ffcf75}nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:10px;background:#fff;position:sticky;top:0;z-index:10;box-shadow:0 4px 14px #0001}nav a,nav button,.btn{border:0;border-radius:6px;background:#0057a8;color:#fff;text-decoration:none;padding:9px 12px;font-weight:800;cursor:pointer}.danger{background:#c81e1e}.edit{background:#ff7a00;color:#03224d}.muted{background:#596579}main{max-width:1150px;margin:auto;padding:18px 3%}.panel{background:#fff;border:1px solid #d8e6f5;border-top:4px solid #ff7a00;border-radius:8px;padding:14px;margin-bottom:15px;box-shadow:0 8px 22px #03224d12}.panel h2{margin:0 0 10px;color:#0057a8}.admin-info{text-align:center;background:#eaf4ff}textarea{width:100%;min-height:320px;padding:12px;border:1px solid #b9cee5;border-radius:7px;font:13px/1.5 Consolas,monospace;resize:vertical}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.status{margin-top:9px;font-weight:800;color:#0057a8}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;background:#f5f9ff;border-left:4px solid #0057a8;border-radius:7px;padding:10px;margin-bottom:8px}.row strong{color:#043a76}.row small{display:block;color:#596579;margin-top:3px}.row-actions{display:flex;gap:6px;flex-wrap:wrap}.empty{text-align:center;padding:22px;color:#596579}.count{display:inline-block;background:#eaf4ff;color:#0057a8;border-radius:999px;padding:5px 10px;font-weight:900;margin-bottom:10px}@media(max-width:700px){.row{display:block}.row-actions{margin-top:9px}.row-actions button{flex:1}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}}
</style>
<link rel="stylesheet" href="/site-theme.css">
</head>
<body>
<div class="topbar"><span>Constitution Manager</span><span id="liveTime"></span></div>
<header class="hero"><h1>भारतीय संविधान Manager</h1><p>Single object या multiple article JSON paste करके save/update करें।</p></header>
<nav><a href="dashboard.html">Dashboard</a><a href="admin-jobs.html">Latest Jobs</a><a href="admin-current-affairs.html">Current Affairs</a><a href="constitution.html">Public Constitution</a><button onclick="logoutUser()">Logout</button></nav>
<main>
  <section class="panel admin-info"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
  <section class="panel">
    <h2 id="formTitle">Article JSON Import</h2>
    <textarea id="articleJson" placeholder='Single: {"articleNo":1,"titleHi":"संघ का नाम...","titleEn":"Name and territory...","partNameHi":"भाग I","status":"published"}&#10;&#10;Multiple: [{"articleNo":1,...},{"articleNo":2,...}]'></textarea>
    <div class="actions"><button onclick="validateArticleJson()">Validate JSON</button><button onclick="saveArticles()">Save / Update</button><button class="muted" onclick="clearForm()">Clear</button></div>
    <div id="status" class="status"></div>
  </section>
  <section class="panel"><h2>Saved Constitution Articles</h2><span class="count">Total: <b id="articleCount">0</b></span><div id="articleRows"><div class="empty">Loading...</div></div></section>
</main>
<script>const updateClock=()=>document.getElementById("liveTime").textContent=new Date().toLocaleString("hi-IN");updateClock();setInterval(updateClock,30000);</script>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import {getDatabase,ref,get,set,remove} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com";
const $=(id)=>document.getElementById(id);let adminAllowed=false,cache={};
const esc=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
const cleanId=(value="")=>String(value).trim().toLowerCase().replace(/[^a-z0-9-]+/g,"-").replace(/^-+|-+$/g,"");
const articleNo=(item={})=>item.articleNo??item.number??item.articleNumber??item.article??"";
const articleId=(item={})=>cleanId(item.id||item.articleId||`article-${articleNo(item)}`);
const titleHi=(item={})=>item.titleHi||item.hindiTitle||item.titleHindi||item.title||"";
const partHi=(item={})=>item.partNameHi||item.partHi||item.part||item.category||"";
const parseInput=()=>{const raw=$("articleJson").value.trim().replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();if(!raw)throw new Error("Article JSON paste करें।");const parsed=JSON.parse(raw);const items=Array.isArray(parsed)?parsed:[parsed];if(!items.length)throw new Error("JSON array खाली है।");items.forEach((item,index)=>{if(!item||typeof item!=="object"||Array.isArray(item))throw new Error(`Item ${index+1} object नहीं है।`);if(!articleNo(item)&&!item.id&&!item.articleId)throw new Error(`Item ${index+1}: articleNo या id required है।`);if(!articleId(item))throw new Error(`Item ${index+1}: valid id नहीं बन सकी।`)});return items};
window.validateArticleJson=()=>{try{const items=parseInput();$("status").textContent=`JSON valid है: ${items.length} article ready.`}catch(error){$("status").textContent="JSON error: "+error.message}};
window.clearForm=()=>{$("articleJson").value="";$("formTitle").textContent="Article JSON Import";$("status").textContent=""};
window.saveArticles=async()=>{if(!adminAllowed){alert("Admin verify नहीं हुआ।");return}try{const items=parseInput();$("status").textContent=`${items.length} article save हो रहे हैं...`;for(const source of items){const id=articleId(source),articleRef=ref(db,`constitutionArticles/${id}`),snap=await get(articleRef),existing=snap.exists()?snap.val()||{}:{},now=new Date().toISOString();await set(articleRef,{...existing,...source,id,articleId:id,articleNo:articleNo(source)||articleNo(existing),status:source.status||existing.status||"published",createdAt:existing.createdAt||source.createdAt||now,updatedAt:now})}localStorage.removeItem("constitutionArticlesCache");$("status").textContent=`${items.length} article save/update हो गए।`;clearForm();await loadArticles()}catch(error){$("status").textContent="Save error: "+error.message}};
window.editArticle=(id)=>{const item=cache[id];if(!item)return;$("articleJson").value=JSON.stringify(item,null,2);$("formTitle").textContent=`Edit ${id}`;scrollTo({top:0,behavior:"smooth"})};
window.deleteArticle=async(id)=>{if(!adminAllowed||!confirm(`${id} delete करना है?`))return;try{await remove(ref(db,`constitutionArticles/${id}`));localStorage.removeItem("constitutionArticlesCache");$("status").textContent=`${id} delete हो गया।`;await loadArticles()}catch(error){$("status").textContent="Delete error: "+error.message}};
window.toggleArticleStatus=async(id)=>{const item=cache[id];if(!item)return;const now=new Date().toISOString(),next=String(item.status||"published").toLowerCase()==="published"?"draft":"published";await set(ref(db,`constitutionArticles/${id}`),{...item,status:next,updatedAt:now});localStorage.removeItem("constitutionArticlesCache");await loadArticles()};
const render=()=>{const rows=Object.entries(cache).sort((a,b)=>String(articleNo(a[1])).localeCompare(String(articleNo(b[1])),undefined,{numeric:true}));$("articleCount").textContent=rows.length;$("articleRows").innerHTML=rows.length?rows.map(([id,item])=>`<div class="row"><div><strong>Article ${esc(articleNo(item)||id)} — ${esc(titleHi(item)||"Title missing")}</strong><small>${esc(partHi(item)||"Part not set")} | ${esc(item.status||"published")} | Updated: ${esc(item.updatedAt||"Not set")}</small></div><div class="row-actions"><button class="edit" onclick="editArticle('${esc(id)}')">Edit</button><button class="muted" onclick="toggleArticleStatus('${esc(id)}')">${String(item.status||"published").toLowerCase()==="published"?"Draft":"Publish"}</button><button class="danger" onclick="deleteArticle('${esc(id)}')">Delete</button></div></div>`).join(""):'<div class="empty">कोई Constitution article save नहीं है।</div>'};
async function loadArticles(){const snap=await get(ref(db,"constitutionArticles"));cache=snap.exists()?snap.val()||{}:{};render()}
onAuthStateChanged(auth,async(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;$("accessTitle").textContent="Admin Access Verified";$("adminEmailText").textContent=user.email;try{await loadArticles()}catch(error){$("articleRows").innerHTML=`<div class="empty">Load error: ${esc(error.message)}</div>`}}else{location.replace("index.html")}});
window.logoutUser=async()=>{try{await signOut(auth)}finally{location.replace("index.html")}};
</script>
<script src="/site-theme.js" defer></script>
</body></html>
