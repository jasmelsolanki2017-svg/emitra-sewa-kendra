<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Updates Manager | E-MITRA WALA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Devanagari',sans-serif}body{background:#f7fbff;color:#172033}.topbar{background:#043a76;color:white;padding:6px 3%;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}header{background:linear-gradient(135deg,#0057a8,#03224d);color:white;text-align:center;padding:16px 3%;border-bottom:3px solid #ff7a00}header h1{color:#ff7a00;font-size:clamp(22px,4vw,32px)}nav{background:white;padding:8px 3%;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}nav a,nav button{background:#0057a8;color:white;border:0;text-decoration:none;padding:7px 11px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}nav a:hover,nav button:hover{background:#ff7a00;color:#03224d}main{max-width:980px;margin:auto;padding:16px 3% 34px}.panel{background:white;border:1px solid #d8e6f5;border-top:3px solid #ff7a00;border-radius:7px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.07)}.admin-info{text-align:center;background:#eaf4ff;border-left:4px solid #ff7a00;border-top:0}.panel h2{color:#0057a8;font-size:18px;margin-bottom:8px}.form{display:grid;grid-template-columns:1fr auto;gap:7px}.form input{width:100%;min-width:0;padding:8px 9px;border:1px solid #bdd0e5;border-radius:6px;font-size:12px}button{border:0;border-radius:6px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer;background:#0057a8;color:white}.delete{background:#d90000}.status{font-weight:800;color:#0057a8;margin-top:8px;font-size:12px}.row{background:#eaf4ff;border-left:3px solid #0057a8;border-radius:7px;padding:9px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.row strong{color:#0057a8}.row small{display:block;color:#4d5d72;font-size:11px}.empty{padding:18px;text-align:center;color:#55657a;font-weight:700}@media(max-width:720px){.form{grid-template-columns:1fr}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}}
  </style>
</head>
<body>
  <div class="topbar"><div>Latest Updates Manager</div><div id="liveTime">Loading...</div></div>
  <header><h1>Latest Updates Manager</h1><p>Homepage updates yahan se live add/delete karein.</p></header>
  <nav><a href="dashboard.html">Dashboard</a><a href="admin-links.html">Important Links</a><a href="admin-ads.html">Advertisements</a><a href="admin-jobs.html">Latest Jobs</a><a href="portal-items.html">Portal Items</a><button onclick="logoutUser()">Logout</button></nav>
  <main>
    <section class="panel admin-info"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
    <section class="panel"><h2>Add Update</h2><div class="form"><input id="updateText" placeholder="Update text"><button onclick="addLatestUpdate()">Add Update</button></div><div id="updateStatus" class="status"></div></section>
    <section class="panel"><h2>Saved Updates (<span id="updatesCount">0</span>)</h2><div id="adminUpdatesList"><div class="empty">Loading...</div></div></section>
  </main>
  <script>function updateLiveTime(){liveTime.innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,push,set,remove,onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com",updatesRef=ref(db,"latestUpdates");let adminAllowed=false;
    const accessTitle=document.getElementById("accessTitle"),adminEmailText=document.getElementById("adminEmailText"),updateText=document.getElementById("updateText"),updateStatus=document.getElementById("updateStatus"),adminUpdatesList=document.getElementById("adminUpdatesList"),updatesCount=document.getElementById("updatesCount");
    const escapeHTML=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const formatDate=(v)=>v?new Date(Number(v)).toLocaleString("hi-IN"):"Not available";
    const normalizeUpdate=(id,value)=>typeof value==="string"?{id,text:value,createdAt:0}:{id,...(value&&typeof value==="object"?value:{})};
    const getUpdateRows=(snapshot)=>{const rows=[];if(!snapshot.exists()){return rows}const value=snapshot.val();if(value&&typeof value==="object"&&("text" in value)){return [normalizeUpdate(snapshot.key||"latest",value)]}snapshot.forEach(child=>rows.push(normalizeUpdate(child.key,child.val())));return rows.filter(item=>String(item.text||"").trim()).sort((a,b)=>Number(b.createdAt||0)-Number(a.createdAt||0))};
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;accessTitle.innerText="Admin Access Verified";adminEmailText.innerText=user.email}else{location.href="index.html"}});
    window.addLatestUpdate=()=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const text=updateText.value.trim();if(!text){alert("Update text likhen");return}updateStatus.innerText="Saving...";set(push(updatesRef),{text,createdAt:Date.now()}).then(()=>{updateStatus.innerText="Update Added.";updateText.value=""}).catch(e=>alert(e.message))};
    window.deleteLatestUpdate=(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}if(confirm("Ye update delete karna hai?"))remove(ref(db,"latestUpdates/"+id)).catch(e=>alert(e.message))};
    onValue(updatesRef,(snapshot)=>{adminUpdatesList.innerHTML="";const rows=getUpdateRows(snapshot);updatesCount.innerText=rows.length;if(rows.length){rows.forEach(data=>{adminUpdatesList.innerHTML+=`<div class="row"><div><strong>${escapeHTML(data.text||"Update")}</strong><small>Added: ${escapeHTML(formatDate(data.createdAt))}</small></div><button class="delete" onclick="deleteLatestUpdate('${data.id}')">Delete</button></div>`})}else{adminUpdatesList.innerHTML='<div class="empty">Abhi koi update save nahi hai.</div>'}});
    window.logoutUser=()=>signOut(auth).then(()=>location.href="index.html");
  </script>
</body>
</html>
