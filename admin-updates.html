<head>

<meta name="description" content="Admin Updates page on E-MITRA WALA with useful public information, services, tools and updates.">

<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Devanagari',sans-serif}body{background:#f7fbff;color:#172033}.topbar{background:#043a76;color:white;padding:6px 3%;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}header{background:linear-gradient(135deg,#0057a8,#03224d);color:white;text-align:center;padding:16px 3%;border-bottom:3px solid #ff7a00}header h1{color:#ff7a00;font-size:clamp(22px,4vw,32px)}nav{background:white;padding:8px 3%;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}nav a,nav button{background:#0057a8;color:white;border:0;text-decoration:none;padding:7px 11px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}nav a:hover,nav button:hover{background:#ff7a00;color:#03224d}main{max-width:1120px;margin:auto;padding:16px 3% 34px}.panel{background:white;border:1px solid #d8e6f5;border-top:3px solid #ff7a00;border-radius:7px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.07)}.admin-info{text-align:center;background:#eaf4ff;border-left:4px solid #ff7a00;border-top:0}.panel h2{color:#0057a8;font-size:18px;margin-bottom:8px}.form{display:grid;grid-template-columns:1fr auto;gap:7px;align-items:start}.form textarea{width:100%;min-width:0;min-height:82px;resize:vertical;padding:10px 11px;border:1px solid #bdd0e5;border-radius:6px;font-size:13px;line-height:1.45}.form-actions{display:grid;gap:7px}.form button{min-height:37px}button{border:0;border-radius:6px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer;background:#0057a8;color:white}.delete{background:#d90000}.edit{background:#ff7a00;color:#03224d}.hide-btn{background:#555}.cancel{background:#555;display:none}.status{font-weight:800;color:#0057a8;margin-top:8px;font-size:12px}.list-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}.count-pill{background:#eaf4ff;color:#0057a8;border:1px solid #bdd0e5;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.updates-list{display:grid;gap:8px}.update-card{background:#eaf4ff;border:1px solid #d8e6f5;border-left:4px solid #0057a8;border-radius:7px;padding:9px;display:grid;grid-template-columns:58px minmax(0,1fr) 220px;gap:9px;align-items:center}.update-card.is-hidden{opacity:.76;border-left-color:#555}.update-card h3{color:#0057a8;font-size:13px;line-height:1.35;overflow:hidden;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.update-card small{display:block;color:#4d5d72;font-size:10px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.serial{display:inline-flex;align-items:center;justify-content:center;width:38px;height:28px;border-radius:6px;background:#0057a8;color:white;font-weight:800;font-size:12px}.badge{display:inline-block;background:white;border:1px solid #bdd0e5;border-radius:999px;color:#0057a8;font-size:10px;font-weight:900;padding:2px 7px;margin-top:4px}.update-text{min-width:0}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.actions button{width:100%;padding:8px 7px}.empty{padding:18px;text-align:center;color:#55657a;font-weight:700}@media(max-width:720px){.form{grid-template-columns:1fr}.form button{min-height:auto}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}.update-card{grid-template-columns:44px minmax(0,1fr);align-items:start}.actions{grid-column:1/-1;grid-template-columns:1fr 1fr 1fr}.serial{width:32px;height:26px}}
    .update-card{grid-template-columns:58px minmax(0,1fr) 330px}.actions{grid-template-columns:1.6fr .8fr .8fr}@media(max-width:900px){.update-card{grid-template-columns:44px minmax(0,1fr);align-items:start}.actions{grid-column:1/-1;grid-template-columns:1fr 1fr 1fr}}
  </style>
<link rel="stylesheet" href="/site-theme.css">
<link rel="canonical" href="https://emitrawala.online/admin-updates.html">
</head>
<body>
  <div class="topbar"><div>Latest Updates Manager</div><div id="liveTime">Loading...</div></div>
  <header><h1>Latest Updates Manager</h1><p>Homepage updates yahan se live add/delete karein.</p></header>
  <nav><a href="dashboard.html">Dashboard</a><a href="admin-links.html">Important Links</a><a href="admin-ads.html">Advertisements</a><a href="premium-admin.html">Premium Post</a><a href="admin-auto-checker.html">Auto Job Checker</a><button onclick="logoutUser()">Logout</button></nav>
  <main>
    <section class="panel admin-info"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
    <section class="panel">
      <h2>Add Update</h2>
      <div class="form">
        <textarea id="updateText" placeholder="Update text yahan likhen. Long update bhi save ho jayegi."></textarea>
        <div class="form-actions">
          <button id="saveUpdateBtn" onclick="saveLatestUpdate()">Add Update</button>
          <button class="cancel" id="cancelEditBtn" type="button" onclick="cancelUpdateEdit()">Cancel Edit</button>
        </div>
      </div>
      <div id="updateStatus" class="status"></div>
    </section>
    <section class="panel">
      <div class="list-head">
        <h2>Saved Updates</h2>
        <span class="count-pill">Total: <span id="updatesCount">0</span></span>
      </div>
      <div id="listStatus" class="status">Loading updates...</div>
      <div id="adminUpdatesList" class="updates-list"><div class="empty">Loading...</div></div>
    </section>
  </main>
  <script>function updateLiveTime(){liveTime.innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,push,set,update,remove,onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com",updatesRef=ref(db,"latestUpdates");let adminAllowed=false,editingUpdateId=null,updatesCache={},jobsCache={},jobsRows=[];
    const accessTitle=document.getElementById("accessTitle"),adminEmailText=document.getElementById("adminEmailText"),updateText=document.getElementById("updateText"),updateStatus=document.getElementById("updateStatus"),adminUpdatesList=document.getElementById("adminUpdatesList"),updatesCount=document.getElementById("updatesCount"),listStatus=document.getElementById("listStatus"),saveUpdateBtn=document.getElementById("saveUpdateBtn"),cancelEditBtn=document.getElementById("cancelEditBtn");
    const escapeHTML=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const formatDate=(v)=>v?new Date(Number(v)).toLocaleString("hi-IN"):"Not available";
    const slugify=(value="post")=>String(value||"post").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g,"").replace(/['"]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,90)||"post";
    function makePostUrl(post={}){let raw=post.url||post.link||post.postUrl||post.slug||post.postSlug||post.premiumPostSlug||"";raw=String(raw||"").trim();if(!raw)return"";if(/^https?:\/\//i.test(raw))return raw;raw=raw.replace(/^\/+/,"").replace(/^index\.html#?/i,"").replace(/^#/,"");if(!raw||raw==="javascript:void(0)")return"";if(raw.startsWith("post/"))return"/"+raw.replace(/\/?$/,"/");return"/post/"+raw.replace(/^post\/?/i,"").replace(/\/?$/,"/")}
    const postSlug=(id,data={})=>String(data.slug||data.postSlug||data.premiumPostSlug||slugify(data.title||id)).trim();
    const latestUpdateId=(id,data={})=>`post_${postSlug(id,data).replace(/[^a-zA-Z0-9_-]/g,"_")}`;
    const findLatestUpdateKey=(id,data={})=>{const slug=postSlug(id,data).toLowerCase();const postId=String(id||slug).toLowerCase();const expected=latestUpdateId(id,data);if(updatesCache[expected])return expected;const found=Object.entries(updatesCache).find(([key,item])=>String(item.slug||"").toLowerCase()===slug||String(item.postId||item.sourceJobId||"").toLowerCase()===postId||String(key).toLowerCase()===`job_${postId}`);return found?found[0]:expected};
    const updateTitle=(data={})=>String(data.title||data.jobTitle||data.text||"Post Update").trim();
    const updateCategory=(data={})=>String(data.category||data.type||data.postTarget||"Post").trim();
    const updateDate=(data={})=>data.date||data.postDate||data.createdAt||data.updatedAt||Date.now();
    const normalizeUpdate=(id,value)=>typeof value==="string"?{id,text:value,createdAt:0}:{id,...(value&&typeof value==="object"?value:{})};
    const getUpdateRows=(snapshot)=>{const rows=[];if(!snapshot.exists()){return rows}const value=snapshot.val();if(typeof value==="string"){rows.push(normalizeUpdate(snapshot.key||"latest",value));return rows}if(value&&typeof value==="object"&&String(value.text||"").trim()){rows.push(normalizeUpdate(snapshot.key||"latest",value))}if(value&&typeof value==="object"){Object.entries(value).forEach(([id,item])=>{if(id==="text"||id==="createdAt"||id==="updatedAt"){return}rows.push(normalizeUpdate(id,item))})}return rows.filter(item=>String(item.text||"").trim()).sort((a,b)=>Number(b.createdAt||b.updatedAt||0)-Number(a.createdAt||a.updatedAt||0))};
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;accessTitle.innerText="Admin Access Verified";adminEmailText.innerText=user.email}else{location.replace("index.html")}});
    window.saveLatestUpdate=()=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const text=updateText.value.trim();if(!text){alert("Update text likhen");return}updateStatus.innerText=editingUpdateId?"Updating...":"Saving...";const task=editingUpdateId?update(ref(db,"latestUpdates/"+editingUpdateId),{title:text,text,visible:true,status:"published",updatedAt:Date.now()}):set(push(updatesRef),{title:text,text,visible:true,status:"published",createdAt:Date.now(),updatedAt:Date.now()});task.then(()=>{updateStatus.innerText=editingUpdateId?"Update Edited.":"Update Added.";window.cancelUpdateEdit()}).catch(e=>alert(e.message))};
    window.editLatestUpdate=(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const data=updatesCache[id];if(!data){alert("Update data nahi mila. Page refresh karke try karein.");return}editingUpdateId=id;updateText.value=data.text||"";saveUpdateBtn.innerText="Update";cancelEditBtn.style.display="block";updateStatus.innerText="Edit mode active. Text badal kar Update dabayein.";updateText.focus();scrollTo({top:0,behavior:"smooth"})};
    window.cancelUpdateEdit=()=>{editingUpdateId=null;updateText.value="";saveUpdateBtn.innerText="Add Update";cancelEditBtn.style.display="none"};
    window.toggleUpdateVisibility=(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const data=updatesCache[id];if(!data){alert("Update data nahi mila. Page refresh karke try karein.");return}const nextStatus=String(data.status||"published").toLowerCase()==="draft"?"published":"draft";update(ref(db,"latestUpdates/"+id),{status:nextStatus,updatedAt:Date.now()}).then(()=>{updateStatus.innerText=nextStatus==="draft"?"Update hide ho gayi.":"Update unhide ho gayi."}).catch(e=>alert(e.message))};
    window.deleteLatestUpdate=(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}if(confirm("Ye update delete karna hai?"))remove(ref(db,"latestUpdates/"+id)).catch(e=>alert(e.message))};
    window.showPostInLatestUpdates=async(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const data=jobsCache[id];if(!data){alert("Post data nahi mila.");return}const slug=postSlug(id,data);const url=makePostUrl({slug});if(!url){alert("Post URL missing hai.");return}const key=findLatestUpdateKey(id,data);const now=Date.now();await set(ref(db,`latestUpdates/${key}`),{title:updateTitle(data),text:updateTitle(data),slug,url,postUrl:url,link:url,postId:id||slug,category:updateCategory(data),date:updateDate(data),visible:true,status:"published",createdAt:Number(updatesCache[key]?.createdAt||data.createdAt||now),updatedAt:now});updateStatus.innerText="Post Latest Updates me show ho gayi."};
    window.hidePostFromLatestUpdates=async(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const data=jobsCache[id];if(!data){alert("Post data nahi mila.");return}const key=findLatestUpdateKey(id,data);await update(ref(db,`latestUpdates/${key}`),{visible:false,status:"draft",updatedAt:Date.now()});updateStatus.innerText="Post Latest Updates se hide ho gayi."};
    function renderPostManagement(){updatesCount.innerText=jobsRows.length;listStatus.innerText=`${jobsRows.length} posts load hui. Show/Hide se homepage Latest Updates control karein.`;if(!jobsRows.length){adminUpdatesList.innerHTML='<div class="empty">Abhi koi post available nahi hai.</div>';return}adminUpdatesList.innerHTML=jobsRows.map(({id,data},index)=>{const key=findLatestUpdateKey(id,data);const saved=updatesCache[key]||{};const isVisible=saved.visible===true||String(saved.status||"").toLowerCase()==="published";const slug=postSlug(id,data);const url=makePostUrl({slug});return `<article class="update-card ${isVisible?"":"is-hidden"}"><span class="serial">${index+1}</span><div class="update-text"><h3 title="${escapeHTML(updateTitle(data))}">${escapeHTML(updateTitle(data))}</h3><small>${escapeHTML(updateCategory(data))} | ${escapeHTML(formatDate(updateDate(data)))}</small><small>URL: ${escapeHTML(url||"Missing URL")}</small><span class="badge">${isVisible?"Showing in Latest Updates":"Hidden from Latest Updates"}</span></div><div class="actions"><button class="${isVisible?"hide-btn":"edit"}" onclick="${isVisible?`hidePostFromLatestUpdates('${id}')`:`showPostInLatestUpdates('${id}')`}">${isVisible?"Hide":"Show in Latest Updates"}</button><button onclick="window.open('${escapeHTML(url)}','_blank')">Open</button><button class="delete" onclick="deleteLatestUpdate('${key}')">Remove</button></div></article>`}).join("")}
    onValue(updatesRef,(snapshot)=>{const rows=getUpdateRows(snapshot);updatesCache={};rows.forEach(item=>updatesCache[item.id]=item);renderPostManagement()},(error)=>{updatesCount.innerText="0";listStatus.innerText="Updates load nahi hui: "+error.message;adminUpdatesList.innerHTML='<div class="empty">Firebase se updates load nahi ho payi.</div>'});
    onValue(ref(db,"LatestJobs"),(snapshot)=>{jobsRows=[];jobsCache={};if(snapshot.exists()){snapshot.forEach(child=>{const data=child.val()||{};if(!data.title)return;jobsCache[child.key]=data;jobsRows.push({id:child.key,data})})}jobsRows.sort((a,b)=>Number(b.data.createdAt||b.data.updatedAt||0)-Number(a.data.createdAt||a.data.updatedAt||0));renderPostManagement()},(error)=>{listStatus.innerText="Posts load nahi hui: "+error.message});
    window.logoutUser=async()=>{adminAllowed=false;localStorage.removeItem("loginTime");try{await signOut(auth)}catch(error){console.warn("Admin logout failed",error)}location.replace("index.html")};
  </script>
<script src="/site-theme.js" defer></script>
