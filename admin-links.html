<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Important Links Manager | E-MITRA WALA</title>
<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Devanagari',sans-serif}body{background:#f7fbff;color:#172033}.topbar{background:#043a76;color:white;padding:6px 3%;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}header{background:linear-gradient(135deg,#0057a8,#03224d);color:white;text-align:center;padding:16px 3%;border-bottom:3px solid #ff7a00}header h1{color:#ff7a00;font-size:clamp(22px,4vw,32px)}nav{background:white;padding:8px 3%;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}nav a,nav button{background:#0057a8;color:white;border:0;text-decoration:none;padding:7px 11px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}nav a:hover,nav button:hover{background:#ff7a00;color:#03224d}main{max-width:980px;margin:auto;padding:16px 3% 34px}.panel{background:white;border:1px solid #d8e6f5;border-top:3px solid #ff7a00;border-radius:7px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.07)}.admin-info{text-align:center;background:#eaf4ff;border-left:4px solid #ff7a00;border-top:0}.panel h2{color:#0057a8;font-size:18px;margin-bottom:8px}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:7px}.form input{width:100%;min-width:0;padding:8px 9px;border:1px solid #bdd0e5;border-radius:6px;font-size:12px}button{border:0;border-radius:6px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer;background:#0057a8;color:white}.delete{background:#d90000}.status{font-weight:800;color:#0057a8;margin-top:8px;font-size:12px}.row{background:#eaf4ff;border-left:3px solid #0057a8;border-radius:7px;padding:9px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.row a{color:#0057a8;font-weight:800}.row small{display:block;color:#4d5d72;font-size:11px;overflow-wrap:anywhere}.empty{padding:18px;text-align:center;color:#55657a;font-weight:700}@media(max-width:720px){.form{grid-template-columns:1fr}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}}
  </style>
</head>
<body>
  <div class="topbar"><div>Important Links Manager</div><div id="liveTime">Loading...</div></div>
  <header><h1>Important Links Manager</h1><p>Index page ke live links yahan se add/delete karein.</p></header>
  <nav><a href="dashboard.html">Dashboard</a><a href="admin-updates.html">Latest Updates</a><a href="admin-ads.html">Advertisements</a><a href="admin-jobs.html">Latest Jobs</a><a href="admin-auto-checker.html">Auto Job Checker</a><a href="portal-items.html">Portal Items</a><button onclick="logoutUser()">Logout</button></nav>
  <main>
    <section class="panel admin-info"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
    <section class="panel">
      <h2>Add Link</h2>
      <div class="form"><input id="linkTitle" placeholder="Link Name"><input id="linkUrl" type="url" placeholder="URL https://..."><button onclick="addImportantLink()">Add Link</button></div>
      <div id="linkStatus" class="status"></div>
    </section>
    <section class="panel"><h2>Saved Links</h2><div id="adminLinksList"><div class="empty">Loading...</div></div></section>
  </main>
  <script>function updateLiveTime(){document.getElementById("liveTime").innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,push,set,remove,onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com",linksRef=ref(db,"importantLinks");let adminAllowed=false;
    const accessTitle=document.getElementById("accessTitle"),adminEmailText=document.getElementById("adminEmailText"),linkTitle=document.getElementById("linkTitle"),linkUrl=document.getElementById("linkUrl"),linkStatus=document.getElementById("linkStatus"),adminLinksList=document.getElementById("adminLinksList");
    const escapeHTML=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const safeUrl=(v="#")=>/^https?:\/\//i.test(String(v||"").trim())?String(v).trim():"#";
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;accessTitle.innerText="Admin Access Verified";adminEmailText.innerText=user.email}else{location.href="index.html"}});
    window.addImportantLink=()=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const title=linkTitle.value.trim(),url=linkUrl.value.trim();if(!title||!url){alert("Link name aur URL dono bharen");return}if(!/^https?:\/\//i.test(url)){alert("URL http:// ya https:// se start hona chahiye");return}linkStatus.innerText="Saving...";set(push(linksRef),{title,url,createdAt:Date.now()}).then(()=>{linkStatus.innerText="Link Added.";linkTitle.value="";linkUrl.value=""}).catch(e=>alert(e.message))};
    window.deleteImportantLink=(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}if(confirm("Ye link delete karna hai?"))remove(ref(db,"importantLinks/"+id)).catch(e=>alert(e.message))};
    onValue(linksRef,(snapshot)=>{const list=adminLinksList;list.innerHTML="";if(snapshot.exists()){snapshot.forEach((child)=>{const data=child.val()||{};list.innerHTML+=`<div class="row"><div><a href="${safeUrl(data.url)}" target="_blank" rel="noopener noreferrer">${escapeHTML(data.title||"Link")}</a><small>${escapeHTML(data.url||"#")}</small></div><button class="delete" onclick="deleteImportantLink('${child.key}')">Delete</button></div>`})}else{list.innerHTML='<div class="empty">Abhi koi link save nahi hai.</div>'}});
    window.logoutUser=()=>signOut(auth).then(()=>location.href="index.html");
  </script>
</body>
</html>
