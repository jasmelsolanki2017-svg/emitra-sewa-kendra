  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,"Noto Sans Devanagari",sans-serif}body{background:#f7fbff;color:#172033}.topbar{background:#043a76;color:white;padding:7px 3%;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}header{background:linear-gradient(135deg,#0057a8,#03224d);color:white;text-align:center;padding:18px 3%;border-bottom:3px solid #ff7a00}header h1{color:#ffb45c;font-size:clamp(24px,4vw,34px)}nav{background:white;padding:8px 3%;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}nav a,nav button{background:#0057a8;color:white;border:0;text-decoration:none;padding:8px 12px;border-radius:6px;font-weight:800;font-size:12px;cursor:pointer}nav a:hover,nav button:hover{background:#ff7a00;color:#03224d}main{max-width:1080px;margin:auto;padding:16px 3% 34px}.panel{background:white;border:1px solid #d8e6f5;border-top:3px solid #ff7a00;border-radius:8px;padding:14px;margin-bottom:14px;box-shadow:0 5px 16px rgba(0,0,0,.07)}.panel h2{color:#0057a8;font-size:19px;margin-bottom:8px}.status{font-weight:900;color:#0057a8;margin-top:8px;font-size:13px}.user-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.user-card{background:#f7fbff;border:1px solid #dbe7f4;border-left:5px solid #0057a8;border-radius:8px;padding:12px;text-align:left;color:#03224d}.user-card.active{border-left-color:#ff7a00;background:#fff8ef}.user-card strong{display:block;font-size:15px}.user-card small{display:block;color:#4d5d72;margin-top:3px;overflow-wrap:anywhere}.user-card span{display:inline-flex;margin-top:8px;border-radius:999px;background:#eaf4ff;color:#0057a8;padding:3px 8px;font-size:11px;font-weight:900}.back-btn{margin:0 0 10px;background:#555}.row{background:#f7fbff;border:1px solid #dbe7f4;border-left:4px solid #0057a8;border-radius:8px;padding:12px;margin-bottom:10px;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:12px}.row.verified{border-left-color:#138a36}.row strong{display:block;color:#03224d;font-size:16px}.row small{display:block;color:#4d5d72;font-size:12px;overflow-wrap:anywhere;margin-top:3px}.badge{display:inline-flex;margin-top:7px;border-radius:999px;background:#eaf4ff;color:#0057a8;padding:4px 9px;font-weight:900;font-size:12px}.verified .badge{background:#ecfdf3;color:#087047}.actions{display:grid;gap:7px;align-content:start}.actions input,.actions textarea{width:100%;border:1px solid #bdd0e5;border-radius:6px;padding:8px;font-size:12px}.actions textarea{min-height:58px;resize:vertical}button{border:0;border-radius:6px;padding:9px 11px;font-size:12px;font-weight:900;cursor:pointer;background:#0057a8;color:white}.upload{background:#138a36}.download{background:#673ab7}.empty{padding:20px;text-align:center;color:#55657a;font-weight:800}@media(max-width:820px){.row{grid-template-columns:1fr}.user-list{grid-template-columns:1fr}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}}
  </style>
<link rel="stylesheet" href="/site-theme.css">
<link rel="canonical" href="https://emitrawala.online/admin-pdf-verification.html">
<meta property="og:title" content="PDF Verification Requests | E-MITRA WALA">
<meta property="og:description" content="Admin Pdf Verification page on E-MITRA WALA with useful public information, services, tools and updates.">
<meta property="og:url" content="https://emitrawala.online/admin-pdf-verification.html">
<meta property="og:type" content="article">
</head>
<body>
  <div class="topbar"><div>PDF Verification Requests</div><div id="liveTime">Loading...</div></div>
  <header><h1>PDF Verification Requests</h1><p>User ke original PDF download karein, manually verify karke green-tick PDF upload karein.</p></header>
  <nav><a href="dashboard.html">Dashboard</a><a href="user-dashboard.html">User Dashboard</a><a href="pdf-signature-verify.html">PDF Tool</a><button onclick="logoutUser()">Logout</button></nav>
  <main>
    <section class="panel"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p><div id="adminStatus" class="status"></div></section>
    <section class="panel"><h2>Pending / Verified Requests</h2><div id="requestList"><div class="empty">Loading...</div></div></section>
  </main>
  <script>function updateLiveTime(){document.getElementById("liveTime").innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com";
    const serverKey="emitraAdminServerUrl",defaultServer="https://emitra-sewa-kendra.onrender.com";
    let adminAllowed=false,requests=[],topPdfRequests=[],userPdfRequests=[],selectedUserKey="";
    const $=(id)=>document.getElementById(id);
    const escapeHTML=(value="")=>String(value).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const escapeJs=(value="")=>String(value).replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    const apiBase=()=>String(localStorage.getItem(serverKey)||defaultServer).trim().replace(/\/+$/,"")||defaultServer;
    const apiUrl=(path)=>apiBase()+path;
    const readApi=async(response)=>{const text=await response.text();let data={};try{data=text?JSON.parse(text):{}}catch{throw new Error(text.slice(0,180)||"Server response invalid")}if(!response.ok||data.ok===false||data.success===false)throw new Error(data.error||data.message||`Request failed (${response.status})`);return data};
    const apiJson=async(path,payload={})=>{const token=await auth.currentUser.getIdToken();const response=await fetch(apiUrl(path),{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(payload)});return readApi(response)};
    const apiForm=async(path,formData)=>{const token=await auth.currentUser.getIdToken();const response=await fetch(apiUrl(path),{method:"POST",headers:{"Authorization":"Bearer "+token},body:formData});return readApi(response)};
    const setStatus=(text)=>{$("adminStatus").innerText=text};
    const syncPdfRequests=()=>{
      const byId=new Map();
      [...topPdfRequests,...userPdfRequests].forEach((item)=>{
        if(!item?.id)return;
        byId.set(item.id,{id:item.id,data:{...(byId.get(item.id)?.data||{}),...(item.data||{})}});
      });
      requests=[...byId.values()].sort((a,b)=>Number(b.data.createdAt||0)-Number(a.data.createdAt||0));
      render();
    };
    const getUserKey=(data={})=>data.userUid||data.userEmail||data.userName||"unknown-user";
    const getUserLabel=(data={})=>data.userName||data.userEmail||data.userUid||"User";
    const getGroupedUsers=()=>{const map=new Map();requests.forEach(({data})=>{const key=getUserKey(data),label=getUserLabel(data);const row=map.get(key)||{key,label,email:data.userEmail||"",count:0,pending:0,latest:0};row.count+=1;if(String(data.status||"Pending").toLowerCase()!=="verified")row.pending+=1;row.latest=Math.max(row.latest,Number(data.createdAt||0));map.set(key,row)});return [...map.values()].sort((a,b)=>b.pending-a.pending||b.latest-a.latest||a.label.localeCompare(b.label))};
    window.selectPdfUser=(key="")=>{selectedUserKey=key;render()};
    window.showPdfUserList=()=>{selectedUserKey="";render()};
    const render=()=>{
      const list=$("requestList");
      if(!requests.length){
        list.innerHTML='<div class="empty">Abhi koi PDF verification request nahi hai.</div>';
        return;
      }
      if(!selectedUserKey){
        list.innerHTML=`<div class="user-list">${getGroupedUsers().map((user)=>`<button type="button" class="user-card" onclick="selectPdfUser('${escapeJs(user.key)}')"><strong>${escapeHTML(user.label)}</strong>${user.email?`<small>${escapeHTML(user.email)}</small>`:""}<span>${user.count} PDF${user.pending?` | ${user.pending} Pending`:""}</span></button>`).join("")}</div>`;
        return;
      }
      const selectedRows=requests.filter(({data})=>getUserKey(data)===selectedUserKey);
      const selectedUser=selectedRows[0]?.data||{};
      list.innerHTML=`<button type="button" class="back-btn" onclick="showPdfUserList()">Back to Users</button><div class="status">Showing: ${escapeHTML(getUserLabel(selectedUser))} (${selectedRows.length} PDF)</div>`+selectedRows.map(({id,data})=>{
        const verified=String(data.status||"").toLowerCase()==="verified";
        const userLabel=getUserLabel(data);
        const folderLabel=[data.uploadDateFolder||"Old Upload",data.userFolderName||userLabel].filter(Boolean).join(" / ");
        return `<div class="row ${verified?"verified":""}"><div><strong>${escapeHTML(data.fileName||"Certificate PDF")}</strong><small>Request ID: ${escapeHTML(id)}</small><small>User: ${escapeHTML(userLabel)}</small><small>User Email: ${escapeHTML(data.userEmail||"")}</small><small>Folder: ${escapeHTML(folderLabel)}</small><small>Created: ${data.createdAt?escapeHTML(new Date(Number(data.createdAt)).toLocaleString("hi-IN")):"Recently"}</small><small>Note: ${escapeHTML(data.adminNote||"Pending manual verification")}</small><span class="badge">${escapeHTML(data.status||"Pending")}</span></div><div class="actions"><button class="download" type="button" onclick="downloadPdf('${escapeHTML(id)}','original')">Download Original PDF</button>${verified?`<button class="download" type="button" onclick="downloadPdf('${escapeHTML(id)}','verified')">Download Verified PDF</button>`:""}<input id="file-${escapeHTML(id)}" type="file" accept="application/pdf,.pdf"><textarea id="note-${escapeHTML(id)}" placeholder="Admin note">Verified PDF uploaded by admin.</textarea><button class="upload" type="button" onclick="uploadVerifiedPdf('${escapeHTML(id)}')">Upload Verified PDF</button><button type="button" onclick="deletePdfRequest('${escapeHTML(id)}')">Delete PDFs</button></div></div>`;
      }).join("");
    };
    window.downloadPdf=async(id,fileKind)=>{try{setStatus("Download link ban raha hai...");const result=await apiJson("/api/pdf-verification/download-url",{requestId:id,fileKind});if(!result.signedUrl)throw new Error("Download link nahi mila");window.open(result.signedUrl,"_blank","noopener,noreferrer");setStatus("Download link open ho gaya.")}catch(error){setStatus("Download nahi hua: "+error.message);alert("Download nahi hua: "+error.message)}};
    window.uploadVerifiedPdf=async(id)=>{try{const input=$(`file-${id}`),note=$(`note-${id}`);const file=input?.files?.[0];if(!file){alert("Verified PDF select karein.");return}if(file.type!=="application/pdf"&&!/\.pdf$/i.test(file.name||"")){alert("Sirf PDF upload karein.");return}const formData=new FormData();formData.append("requestId",id);formData.append("adminNote",note?.value||"Verified PDF uploaded by admin.");formData.append("pdf",file);setStatus("Verified PDF upload ho rahi hai...");const result=await apiForm("/admin/pdf-verification/verified-upload",formData);input.value="";setStatus(result.message||"Verified PDF upload ho gayi.")}catch(error){setStatus("Verified upload nahi hua: "+error.message);alert("Verified upload nahi hua: "+error.message)}};
    window.deletePdfRequest=async(id)=>{try{if(!confirm("Is request ki original aur verified PDF storage se delete karni hai?"))return;setStatus("PDF delete ho rahi hai...");const result=await apiJson("/api/pdf-verification/delete",{requestId:id});setStatus(result.message||"PDF delete ho gayi.")}catch(error){setStatus("Delete nahi hua: "+error.message);alert("Delete nahi hua: "+error.message)}};
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;$("accessTitle").innerText="Admin Access Verified";$("adminEmailText").innerText=user.email;onValue(ref(db,"pdfVerificationRequests"),(snapshot)=>{topPdfRequests=[];if(snapshot.exists())snapshot.forEach((child)=>topPdfRequests.push({id:child.key,data:child.val()||{}}));syncPdfRequests()},(error)=>{setStatus("Requests load nahi hui: "+error.message)});onValue(ref(db,"userPdfVerificationRequests"),(snapshot)=>{userPdfRequests=[];if(snapshot.exists())snapshot.forEach((userSnap)=>{userSnap.forEach((child)=>userPdfRequests.push({id:child.key,data:{...(child.val()||{}),userUid:(child.val()||{}).userUid||userSnap.key}}))});syncPdfRequests()},(error)=>{setStatus("User PDF list load nahi hui: "+error.message)})}else{location.replace("index.html")}});
    window.logoutUser=async()=>{adminAllowed=false;localStorage.removeItem("loginTime");try{await signOut(auth)}catch(error){console.warn("Logout failed",error)}location.replace("index.html")};
  </script>
<script src="/site-theme.js" defer></script>
</body>
