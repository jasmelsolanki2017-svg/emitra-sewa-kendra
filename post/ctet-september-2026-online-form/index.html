        return parts.length>1?{title:parts.shift(),details:parts.join(":").trim()}:{title:"Eligibility",details:item};
      });
      return `<ul class="check-list">${rows.map(r=>`<li><b>${escapeHTML(r.title)}</b><br>${valueHTML(r.details)}</li>`).join("")}</ul>`;
    }
    function renderSelection(value){const arr=arrayify(value);return `<div class="timeline">${arr.map((step,i)=>`<div class="timeline-step"><b>${i+1}</b><div>${valueHTML(step)}</div></div>`).join("")}</div>`;}
    function renderDocuments(value){const arr=arrayify(value);return `<ul class="check-list">${arr.map(item=>`<li>${valueHTML(item)}</li>`).join("")}</ul>`;}
    function renderSteps(value){const arr=arrayify(value);return `<ol class="steps">${arr.map(item=>`<li>${valueHTML(item)}</li>`).join("")}</ol>`;}
    function renderLinks(value,data){
      const links=normalizeLinks({...data,importantLinks:value});
      return `<div class="link-grid">${links.map(l=>`<a class="link-card" href="${escapeHTML(l.url)}" target="_blank" rel="noopener noreferrer"><strong>${linkIcon(l.label)} ${escapeHTML(l.label)}</strong><span>यहाँ से direct link open करें</span></a>`).join("")}</div>`;
    }
    function renderRegionWiseLinks(value){
      const rows=arrayify(value).map((item,index)=>{
        if(!isPlainObject(item))return {region:`Region ${index+1}`,resultUrl:firstSafeUrl(item),cutoffUrl:""};
        return {
          region:item.region||item.regionName||item.rrb||item.board||item.name||item.title||item.label||`Region ${index+1}`,
          resultUrl:firstSafeUrl(item.result,item.resultUrl,item.resultURL,item.resultPdf,item.resultPDF,item.resultLink,item.url,item.link,item.pdf),
          cutoffUrl:firstSafeUrl(item.cutoff,item.cutoffUrl,item.cutoffURL,item.cutoffPdf,item.cutoffPDF,item.cutoffLink,item.cutOffUrl,item.cutOffPDF)
        };
      }).filter(item=>isFilled(item.region)&&(item.resultUrl||item.cutoffUrl));
      if(!rows.length)return "";
      return `<div class="region-links-grid">${rows.map(item=>{const result=item.resultUrl,cutoff=item.cutoffUrl;console.debug("Region link",item.region,{resultUrl:result,cutoffUrl:cutoff});return `<div class="region-card"><h4>${escapeHTML(item.region)}</h4>${result?`<a href="${escapeHTML(result)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Result PDF</a>`:""}${cutoff?`<a href="${escapeHTML(cutoff)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Cutoff PDF</a>`:""}</div>`}).join("")}</div>`;
    }
    function renderFaq(value){
      const rows=arrayify(value).map(item=>isPlainObject(item)?item:{question:"Question",answer:item});
      return `<div class="faq-list">${rows.map(item=>`<details class="faq-item"><summary>${escapeHTML(item.question||item.q||item.title||"Question")}</summary><div>${valueHTML(item.answer||item.a||item.value||item.description||"")}</div></details>`).join("")}</div>`;
    }
    function renderContentSections(value){
      const arr=arrayify(value);
      return arr.map(item=>isPlainObject(item)?`<article class="article-section"><h3>${escapeHTML(item.title||item.heading||"Details")}</h3><p>${valueHTML(item.content||item.text||item.body||item.description||item.value||"")}</p></article>`:`<article class="article-section"><p>${valueHTML(item)}</p></article>`).join("");
    }
    function renderRelated(value){
      const arr=arrayify(value);
      return `<div class="related-grid">${arr.map(item=>{const title=item.title||item.name||"Related Post";const fallback=item.slug?`post/${encodeURIComponent(item.slug)}/`:"";const url=safeUrl(item.url||item.link||fallback)||"#";return `<a class="related-card" href="${escapeHTML(url)}"><strong>${escapeHTML(title)}</strong><span>${escapeHTML(item.shortInfo||item.category||"Premium update")}</span></a>`}).join("")}</div>`;
    }
    function renderSection(data,key){
      const value=getSection(data,key);
      if(!isFilled(value)&&key!=="overview"&&key!=="applicationFee"&&key!=="importantLinks")return"";
      if(key==="importantDates")return renderImportantDates(value);
      if(key==="applicationFee")return renderFee(data);
      if(key==="ageLimit")return renderAgeLimit(value);
      if(key==="vacancyDetails")return renderTable(value,["postName","area","totalPost","totalPosts","course","eligibility","note"]);
      if(key==="selectionProcess")return renderSelection(value);
      if(key==="howToCheckResult")return renderSteps(value);
      if(key==="howToApply")return renderSteps(value);
      if(key==="importantLinks")return renderLinks(value,data);
      if(key==="regionWiseResultLinks")return renderRegionWiseLinks(value);
      if(key==="faqs")return renderFaq(value);
      return renderTable(value);
    }
    function renderCard(id,title,html,accent,span=""){return html?`<section id="section-${id}" class="premium-card ${accent||"accent-teal"} ${span||""}"><h2>${escapeHTML(title)}</h2><div class="card-body">${html}</div></section>`:"";}
    function setSeo(data){
      const seo=data.seo||{},title=seo.metaTitle||data.title||"Premium Post";
      document.title=`${title} | E-MITRA WALA`;
      document.querySelector("meta[name='description']")?.setAttribute("content",String(seo.metaDescription||data.shortInfo||data.description||title).slice(0,160));
      const canonical=data.canonicalUrl||`${location.origin}${location.pathname}${data.slug?`?slug=${encodeURIComponent(data.slug)}`:""}`;
      document.querySelector("link[rel='canonical']")?.setAttribute("href",canonical);
      document.querySelectorAll("script[data-schema='premium']").forEach(s=>s.remove());
      addSchema({"@context":"https://schema.org","@type":"Article",headline:data.title||title,description:seo.metaDescription||data.shortInfo||data.description||title,url:canonical,datePublished:data.createdAt?new Date(data.createdAt).toISOString():undefined,dateModified:data.updatedAt?new Date(data.updatedAt).toISOString():undefined,publisher:{"@type":"Organization",name:"E-MITRA WALA",url:location.origin+"/"}});
      const faq=getSection(data,"faqs");
      if(Array.isArray(faq)&&faq.length)addSchema({"@context":"https://schema.org","@type":"FAQPage",mainEntity:faq.map(f=>({"@type":"Question",name:String(f.question||f.q||""),acceptedAnswer:{"@type":"Answer",text:String(f.answer||f.a||"")}})).filter(f=>f.name&&f.acceptedAnswer.text)});
    }
    function addSchema(obj){const s=document.createElement("script");s.type="application/ld+json";s.dataset.schema="premium";s.textContent=JSON.stringify(obj);document.head.appendChild(s);}
    function scrollHashAfterRender(){
      if(!location.hash)return;
      setTimeout(()=>{const el=document.querySelector(location.hash);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},350);
    }
    function renderSidebar(data,links){
      const mini=["importantDates","applicationFee","ageLimit","vacancyDetails","importantLinks","regionWiseResultLinks"].filter(k=>hasRenderableSection(data,k));
      return `<aside class="premium-aside"><div class="aside-phone"><div class="aside-screen"><div class="aside-top"><span>E-MITRA WALA</span><span>☰</span></div><div class="aside-body"><div class="breadcrumb"><a href="index.html">Home</a> › Premium Post</div>${renderMedia(data,true)}<span class="pill">Verified Update</span><h2>${escapeHTML(data.title||"Premium Update")}</h2>${data.shortInfo?`<p>${escapeHTML(data.shortInfo)}</p>`:""}<div class="aside-mini-list"><div class="aside-mini">✓ Verified Update</div><div class="aside-mini">✓ Official Update</div></div>${renderActionButtons(links,4)}<div class="summary-grid">${mini.map(k=>{const def=SECTION_DEFS.find(d=>d[0]===k)||[k,toTitle(k)];return `<a class="summary-card" href="#section-${k}"><span class="summary-icon">${iconFor(k)}</span><span><strong>${escapeHTML(def[1])}</strong><span>${escapeHTML(summaryText(k,getSection(data,k),data))}</span></span></a>`}).join("")}</div></div></div></div></aside>`;
    }
    function renderPremiumPost(data){
      data={...data};
      hasRenderedPost=true;
      if(timeoutId)clearTimeout(timeoutId);
      setSeo(data);
      const links=quickLinks(data),views=data.views||"12,345";
      const hero=`<div class="breadcrumb"><a href="index.html">Home</a> › <span>Premium Post</span> › <strong>${escapeHTML(data.title||"Update")}</strong></div><section class="premium-hero">${renderMedia(data)}<div class="hero-copy"><span class="pill">Verified Update</span><h1>${escapeHTML(data.title||"Premium Update")}</h1>${data.shortInfo?`<p class="hero-short">${escapeHTML(data.shortInfo)}</p>`:""}<div class="status-row"><span class="status-chip">✅ Verified Update</span><span class="status-chip">✅ Official Update</span></div></div></section>${renderActionButtons(links,4)}<div class="verified-strip"><span>✅ E-MITRA WALA VERIFIED UPDATE ✅</span><span>👁 Views: ${escapeHTML(views)}</span></div>${renderSummaryCards(data)}`;
      const sections=`<div class="section-grid">${SECTION_DEFS.map(([key,title,accent,span])=>renderCard(key,title,renderSection(data,key),accent,span)).join("")}</div>`;
      root.innerHTML=`<div class="premium-layout"><div class="premium-main">${hero}${sections}</div>${renderSidebar(data,links)}</div>`;
      const sticky=links.filter(l=>/(apply|download|notification)/i.test(l.label)).slice(0,2);
      mobileSticky.innerHTML=sticky.map(l=>`<a class="action-btn ${linkClass(l.label)}" href="${escapeHTML(l.url)}" target="_blank" rel="noopener noreferrer">${linkIcon(l.label)} ${escapeHTML(l.label)}</a>`).join("");
      scrollHashAfterRender();
    }
    async function loadPremiumPostBySlug(slug){
      if(!slug)throw new Error("URL me slug missing hai.");
      const indexed=await get(ref(db,`premiumPostSlugIndex/${slug}`)).catch(()=>null);
      if(indexed?.exists()){
        const indexedValue=indexed.val();
        const indexedId=typeof indexedValue==="string"?indexedValue:(indexedValue?.id||indexedValue?.key||indexedValue?.postId||"");
        if(indexedId){
          const indexedPost=await get(ref(db,`premiumPosts/${indexedId}`));
          if(indexedPost.exists())return indexedPost.val();
        }
      }
      const exact=await get(ref(db,`premiumPosts/${slug}`));
      if(exact.exists()){
        const data=exact.val();
        if(data?.slug&&data.slug!==slug){
          localStorage.setItem(`premium_post_id_${data.slug}`,slug);
        }
        return data;
      }
      const snap=await get(query(ref(db,"premiumPosts"),orderByChild("slug"),equalTo(slug)));
      let data=null;snap.forEach(child=>{if(!data){data=child.val();localStorage.setItem(`premium_post_id_${slug}`,child.key)}});
      if(!data)throw new Error("Premium post nahi mili.");
      return data;
    }
    async function fetchFreshPost(slug){
      const cachedId=localStorage.getItem(`premium_post_id_${slug}`)||"";
      if(cachedId){
        const snap=await get(ref(db,`premiumPosts/${cachedId}`)).catch(()=>null);
        if(snap?.exists())return snap.val();
      }
      return loadPremiumPostBySlug(slug);
    }
    function showSlowFallback(){
      if(hasRenderedPost)return;
      root.innerHTML='<div class="message">पोस्ट लोड होने में समय लग रहा है, कृपया refresh करें.</div>';
    }
    async function loadWithCache(){
      const staticPost=window.__EMITRA_STATIC_PREMIUM_POST__;
      if(staticPost&&isFilled(staticPost)){
        renderPremiumPost(staticPost);
        return;
      }
      if(!requestedSlug||requestedSlug===samplePremiumPost.slug){
        renderPremiumPost(samplePremiumPost);
        return;
      }
      const cached=readCachedPost(requestedSlug);
      if(cached){
        renderPremiumPost(cached);
      }else{
        if(timeoutId)clearTimeout(timeoutId);
        timeoutId=setTimeout(showSlowFallback,8000);
      }
      try{
        const fresh=await fetchFreshPost(requestedSlug);
        writeCachedPost(requestedSlug,fresh);
        const cachedText=cached?stableStringify(cached):"";
        const freshText=stableStringify(fresh);
        if(!cached||cachedText!==freshText){
          renderPremiumPost(fresh);
        }
      }catch(error){
        if(!cached&&!hasRenderedPost){
          if(timeoutId)clearTimeout(timeoutId);
          root.innerHTML=`<div class="message">${escapeHTML(error.message)}</div>`;
        }
      }
    }
    window.renderPremiumPost=renderPremiumPost;
    window.loadPremiumPostBySlug=loadPremiumPostBySlug;
    loadWithCache();
  </script>
<script src="/site-theme.js" defer></script>
</body>
