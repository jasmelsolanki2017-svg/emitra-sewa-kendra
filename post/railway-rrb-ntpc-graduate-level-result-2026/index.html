    async function loadPremiumPostBySlug(slug){

        if(indexedId){
          const indexedPost=await get(ref(db,`premiumPosts/${indexedId}`));
          if(indexedPost.exists())return indexedPost.val();

      }
      const exact=await get(ref(db,`premiumPosts/${slug}`));
      if(exact.exists()){
        const data=exact.val();
        if(data?.slug&&data.slug!==slug){
          localStorage.setItem(`premium_post_id_${data.slug}`,slug);
        }
        return data;

      const snap=await get(query(ref(db,"premiumPosts"),orderByChild("slug"),equalTo(slug)));

      if(!el)return;
      el.textContent=message||"";
      el.style.color=type==="error"?"#b91c1c":type==="success"?"#0b9444":"#075dcc";
    }
    function collectLiveEdits(){
      const draft=cloneJson(editorDraft||currentPostData||{});
      root.querySelectorAll("[data-edit-path]").forEach((el)=>{
        const path=decodeEditPath(el.getAttribute("data-edit-path"));
        if(!path.length)return;
        setByPath(draft,path,el.innerText.replace(/\u00a0/g," ").trim());
      });
      return draft;
    }
    async function triggerPremiumStaticPublish(slug,reason="premium-live-edit"){
      try{
        const token=await auth.currentUser?.getIdToken();
        if(!token)return {ok:false,error:"Admin token missing"};
        const response=await fetch("/admin/seo/normalize",{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({jobId:`premium-${slug}`,publishStatic:true,reason})});
        return await response.json().catch(()=>({ok:response.ok}));
      }catch(error){return {ok:false,error:error.message}}
    }
    function buildPremiumShareText(data={}){
      const title=data.title||currentPostData?.title||"Premium Update";
      const shortInfo=data.shortInfo||currentPostData?.shortInfo||"";
      const lastDate=data.lastDate||data.lastApplyDate||data.importantDates?.lastDate||data.importantDates?.applicationLastDate||data.importantDates?.feeLastDate||"";
      const url=publicPremiumUrl(data.slug||currentPostSlug||requestedSlug||"");
      const lines=[`📢 *${title}*`,shortInfo?`\n${shortInfo}`:"",lastDate?`⏳ Last Date: ${lastDate}`:"","",`🔗 Details / Apply:`,url,"","🌐 E-MITRA WALA"];
      return lines.filter(Boolean).join("\n");
    }
    async function copyTextToClipboard(text=""){
      try{
        if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(text);return true;}
      }catch(error){}
      return false;
    }
    window.sharePremiumToWhatsapp=async()=>{
      if(!adminAllowed){alert("Admin login required.");return}
      const data=currentPostData||editorDraft||{};
      const text=buildPremiumShareText(data);
      const copied=await copyTextToClipboard(text);
      setAdminStatus(copied?"WhatsApp post copy ho gaya. WhatsApp me paste/send kar do.":"Copy nahi hua, WhatsApp share open ho raha hai.",copied?"success":"error");
      if(!copied){window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank','noopener,noreferrer')}
    };
    window.sendPremiumToTelegram=async()=>{
      if(!adminAllowed){alert("Admin login required.");return}
      const data=currentPostData||editorDraft||{};
      const text=buildPremiumShareText(data);
      try{
        setAdminStatus("Telegram post bheji ja rahi hai...");
        const token=await auth.currentUser?.getIdToken();
        const response=await fetch("/admin/auto-job-checker/share/send",{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({channel:"telegram",jobId:`premium-${data.slug||currentPostSlug||requestedSlug||Date.now()}`,draft:{...data,sourceLink:publicPremiumUrl(data.slug||currentPostSlug||requestedSlug||""),detailLink:publicPremiumUrl(data.slug||currentPostSlug||requestedSlug||""),whatsappPostText:text,telegramPostText:text}})});
        const result=await response.json().catch(()=>({}));
        if(!response.ok||result.ok===false)throw new Error(result.error||`HTTP ${response.status}`);
        setAdminStatus("Telegram par premium post send ho gayi.","success");
      }catch(error){
        setAdminStatus("Telegram send nahi hua: "+error.message,"error");
        window.open(`https://t.me/share/url?url=${encodeURIComponent(publicPremiumUrl(data.slug||currentPostSlug||requestedSlug||""))}&text=${encodeURIComponent(text)}`,'_blank','noopener,noreferrer');
      }
    };
    window.enablePremiumLiveEdit=()=>{
      if(!adminAllowed){alert("Admin login required.");return}
      adminEditMode=true;
      editorDraft=cloneJson(currentPostData||{});
      renderPremiumPost(editorDraft);
      setAdminStatus("Edit mode ON. Yellow fields me direct typing karein.");
    };
    window.cancelPremiumLiveEdit=()=>{
      adminEditMode=false;
      editorDraft=null;
      renderPremiumPost(currentPostData||{});
      setAdminStatus("");
    };
    window.savePremiumLiveEdit=async()=>{
      if(!adminAllowed){alert("Admin login required.");return}
      if(!adminEditMode)return;
      try{
        setAdminStatus("Saving live changes...");
        const now=Date.now();
        const draft={...collectLiveEdits(),slug:currentPostSlug||requestedSlug,updatedAt:now};
        if(!draft.createdAt)draft.createdAt=now;
        if(!draft.status)draft.status="published";
        const mirror=premiumPostToLatestJob(draft);
        await update(ref(db),{[`premiumPosts/${draft.slug}`]:draft,[`LatestJobs/${mirror.id}`]:mirror.data});
        writeCachedPost(draft.slug,draft);
        const publish=await triggerPremiumStaticPublish(draft.slug,"premium-live-edit");
        adminEditMode=false;
        editorDraft=null;
        currentPostData=cloneJson(draft);
        renderPremiumPost(draft);
        setAdminStatus(publish.ok?"Saved. Static post update trigger ho gaya.":"Saved. Static trigger pending: "+(publish.error||"server check karein"),publish.ok?"success":"error");
      }catch(error){
        setAdminStatus("Save error: "+error.message,"error");
      }
    };
    onAuthStateChanged(auth,(user)=>{
      const allowed=!!(user&&String(user.email||"").toLowerCase()===adminEmail.toLowerCase());
      if(adminAllowed===allowed)return;
      adminAllowed=allowed;
      if(!adminAllowed)adminEditMode=false;
      if(currentPostData&&isFilled(currentPostData))renderPremiumPost(currentPostData);
    });
    function renderEmptyPremiumState(message="No premium post selected."){
      root.innerHTML=`<div class="message">${escapeHTML(message)}</div>`;
      mobileSticky.innerHTML="";
    }
    async function loadWithCache(){
      const staticPost=window.__EMITRA_STATIC_PREMIUM_POST__;
      if(staticPost&&isFilled(staticPost)){
        renderPremiumPost(staticPost);
        return;
      }
      if(!requestedSlug||requestedSlug===samplePremiumPost.slug){
        renderEmptyPremiumState("No premium post selected. Admin panel se sahi post choose karein.");
        return;
      }
      const cached=readCachedPost(requestedSlug);
      if(cached){
        renderPremiumPost(cached);
      }else{
        if(timeoutId)clearTimeout(timeoutId);
        timeoutId=setTimeout(showSlowFallback,8000);
      }
      try{
        const fresh=await fetchFreshPost(requestedSlug);
        writeCachedPost(requestedSlug,fresh);
        const cachedText=cached?stableStringify(cached):"";
        const freshText=stableStringify(fresh);
        if(!cached||cachedText!==freshText){
          renderPremiumPost(fresh);
        }
      }catch(error){
        if(!cached&&!hasRenderedPost){
          if(timeoutId)clearTimeout(timeoutId);
          root.innerHTML=`<div class="message">${escapeHTML(error.message)}</div>`;
        }
      }
    }
    window.renderPremiumPost=renderPremiumPost;
    window.loadPremiumPostBySlug=loadPremiumPostBySlug;
    loadWithCache();
  </script>
<script src="/site-theme.js" defer></script>
</body>
</html>
