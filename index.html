<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-MITRA WALA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
overflow-x:hidden;
}

nav{
background:#0b3d91;
padding:15px 6%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:700;
color:#ffd000;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:600;
}

.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1400&auto=format&fit=crop') center/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
color:white;
width:90%;
}

.hero-content h1{
font-size:55px;
margin-bottom:20px;
}

.hero-content p{
font-size:18px;
margin-bottom:30px;
}

.hero-content button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#ffd000;
color:#0b3d91;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.latest{
padding:40px 6%;
background:white;
}

.latest h2{
color:#0b3d91;
margin-bottom:15px;
}

marquee{
font-size:18px;
font-weight:600;
}

.important-links{
padding:40px 6%;
background:#eef4ff;
text-align:center;
}

.important-links h2{
color:#0b3d91;
margin-bottom:20px;
}

#importantLinksList a{
display:inline-block;
background:#0b3d91;
color:white;
padding:10px 20px;
margin:8px;
border-radius:30px;
text-decoration:none;
font-weight:700;
}

.login-modal,
.payment-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:9999;
justify-content:center;
align-items:center;
padding:15px;
}

.login-box,
.payment-box{
background:white;
width:380px;
max-width:95%;
padding:30px;
border-radius:18px;
position:relative;
text-align:center;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}

.login-box h2,
.payment-box h2{
color:#0b3d91;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:8px;
}

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
margin-bottom:10px;
}

.signup-btn{
background:#ffd000;
color:#0b3d91;
}

.login-btn{
background:#0b3d91;
color:white;
}

.payment-box h3{
margin:15px 0;
color:#0b3d91;
}

.payment-box img{
width:220px;
height:220px;
border:4px solid #0b3d91;
border-radius:12px;
padding:5px;
margin:15px auto;
display:block;
}

.pay-btn,
.done-btn{
display:block;
width:100%;
padding:12px;
border-radius:8px;
font-weight:700;
text-decoration:none;
margin-top:12px;
}

.pay-btn{
background:#0b3d91;
color:white;
}

.done-btn{
background:#ffd000;
color:#0b3d91;
border:none;
cursor:pointer;
}

footer{
background:#0b3d91;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}

</style>

</head>

<body>

<nav>

<div class="logo">
E-MITRA WALA
</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="JOB-FORM.HTML">Jobs</a></li>
<li><a href="OFFLINEFORM.HTML">Forms</a></li>
<li><a href="#" onclick="openLogin()">Login</a></li>
</ul>

</nav>

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>Welcome To E-MITRA WALA</h1>

<p>Rajasthan ki trusted E-Mitra service website.</p>

<button onclick="openLogin()">
Login / Signup
</button>

</div>

</section>

<section class="latest">

<h2>Latest Updates</h2>

<marquee id="latestUpdatesMarquee">
Loading updates...
</marquee>

</section>

<section class="important-links">

<h2>Important Links</h2>

<div id="importantLinksList">
Loading...
</div>

</section>

<!-- LOGIN POPUP -->

<div class="login-modal" id="loginModal">

<div class="login-box">

<span class="close-btn" onclick="closeLogin()">
×
</span>

<h2>Login / Signup</h2>

<input type="text" id="signupName" placeholder="Full Name">

<input type="tel" id="signupMobile" placeholder="Mobile Number">

<input type="text" id="signupAddress" placeholder="Address">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button class="signup-btn" onclick="openPaymentBeforeSignup()">
Create Account
</button>

<button class="login-btn" onclick="loginUser(email.value,password.value)">
Login
</button>

</div>

</div>

<!-- PAYMENT POPUP -->

<div class="payment-modal" id="paymentModal">

<div class="payment-box">

<span class="close-btn" onclick="closePayment()">
×
</span>

<h2>Payment Required</h2>

<h3>₹99 Account Create Fee</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=9509403258@ybl&pn=E-MITRA%20WALA&am=99&cu=INR">

<a class="pay-btn"
href="upi://pay?pa=9509403258@ybl&pn=E-MITRA%20WALA&am=99&cu=INR">

Pay Now

</a>

<button class="done-btn" onclick="paymentDoneCreateAccount()">
Payment Done - Create Account
</button>

</div>

</div>

<footer>
© 2026 E-MITRA WALA
</footer>

<script>

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
document.getElementById("loginModal").style.display="none";
}

function closePayment(){
document.getElementById("paymentModal").style.display="none";
document.getElementById("loginModal").style.display="flex";
}

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendEmailVerification
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
onValue
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",

authDomain: "my-website-73785.firebaseapp.com",

databaseURL: "https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",

projectId: "my-website-73785",

storageBucket: "my-website-73785.firebasestorage.app",

messagingSenderId: "854088341990",

appId: "1:854088341990:web:3211d4ef9fe4b78d025e27"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

const adminEmail = "jasmelsolanki@gmail.com";

let pendingSignupName = "";
let pendingSignupMobile = "";
let pendingSignupAddress = "";
let pendingSignupEmail = "";
let pendingSignupPassword = "";

/* SIGNUP PAYMENT */

window.openPaymentBeforeSignup = ()=>{

const nameValue = document.getElementById("signupName").value.trim();
const mobileValue = document.getElementById("signupMobile").value.trim();
const addressValue = document.getElementById("signupAddress").value.trim();
const emailValue = document.getElementById("email").value.trim();
const passwordValue = document.getElementById("password").value.trim();

if(nameValue === "" || mobileValue === "" || addressValue === "" || emailValue === "" || passwordValue === ""){
alert("Sab details भरें.");
return;
}

pendingSignupName = nameValue;
pendingSignupMobile = mobileValue;
pendingSignupAddress = addressValue;
pendingSignupEmail = emailValue;
pendingSignupPassword = passwordValue;

document.getElementById("loginModal").style.display="none";
document.getElementById("paymentModal").style.display="flex";

};

/* PAYMENT DONE */

window.paymentDoneCreateAccount = ()=>{

createUserWithEmailAndPassword(auth,pendingSignupEmail,pendingSignupPassword)

.then((userCredential)=>{

const user = userCredential.user;

set(ref(db,"users/" + user.uid),{

name: pendingSignupName,
mobile: pendingSignupMobile,
address: pendingSignupAddress,
email: pendingSignupEmail,
createdAt: Date.now()

});

sendEmailVerification(user)

.then(()=>{

alert("Verification email sent. Gmail verify करके login करें.");

window.location.href="index.html";

});

})

.catch((error)=>{

alert(error.message);

});

};

/* LOGIN */

window.loginUser = (email,password)=>{

if(email === "" || password === ""){
alert("Email aur password भरें.");
return;
}

signInWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

const user = userCredential.user;

if(user.email !== adminEmail && !user.emailVerified){

alert("पहले Gmail verify करें.");
return;

}

localStorage.setItem("loginTime", Date.now());

if(user.email === adminEmail){

window.location.href="dashboard.html";

}

else{

window.location.href="user-dashboard.html";

}

})

.catch(()=>{

alert("Wrong Email or Password");

});

};

/* IMPORTANT LINKS */

const linksRef = ref(db,"importantLinks");

onValue(linksRef,(snapshot)=>{

const box = document.getElementById("importantLinksList");

box.innerHTML = "";

if(snapshot.exists()){

snapshot.forEach((child)=>{

const data = child.val();

box.innerHTML += `
<a href="${data.url}" target="_blank">
${data.title}
</a>
`;

});

}

else{

box.innerHTML = "No Links";

}

});

/* UPDATES */

const updatesRef = ref(db,"latestUpdates");

onValue(updatesRef,(snapshot)=>{

const marquee = document.getElementById("latestUpdatesMarquee");

let updates = [];

if(snapshot.exists()){

snapshot.forEach((child)=>{

updates.push(child.val().text);

});

marquee.innerText = updates.join(" | ");

}

else{

marquee.innerText = "No updates available";

}

});

</script>

</body>
</html>
