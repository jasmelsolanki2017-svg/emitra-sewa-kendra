<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Jobs Manager | E-MITRA WALA</title>
<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Devanagari',sans-serif}body{background:#f7fbff;color:#172033}.topbar{background:#043a76;color:white;padding:6px 3%;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}header{background:linear-gradient(135deg,#0057a8,#03224d);color:white;text-align:center;padding:16px 3%;border-bottom:3px solid #ff7a00}header h1{color:#ff7a00;font-size:clamp(22px,4vw,32px)}nav{background:white;padding:8px 3%;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}nav a,nav button{background:#0057a8;color:white;border:0;text-decoration:none;padding:7px 11px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}nav a:hover,nav button:hover{background:#ff7a00;color:#03224d}main{max-width:1120px;margin:auto;padding:16px 3% 34px}.panel{background:white;border:1px solid #d8e6f5;border-top:3px solid #ff7a00;border-radius:7px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.07)}.admin-info{text-align:center;background:#eaf4ff;border-left:4px solid #ff7a00;border-top:0}.panel h2{color:#0057a8;font-size:18px;margin-bottom:8px}.form{display:grid;grid-template-columns:1fr 1fr;gap:7px}.form input,.form textarea{width:100%;min-width:0;padding:8px 9px;border:1px solid #bdd0e5;border-radius:6px;font-size:12px}.form textarea,.form button{grid-column:1/-1}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;grid-column:1/-1}button{border:0;border-radius:6px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer;background:#0057a8;color:white}.cancel{background:#555;display:none}.delete{background:#d90000}.edit{background:#ff7a00;color:#03224d}.status{font-weight:800;color:#0057a8;margin-top:8px;font-size:12px}.row{background:#eaf4ff;border-left:3px solid #0057a8;border-radius:7px;padding:9px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}.row strong{color:#0057a8;font-size:14px;line-height:1.35;overflow-wrap:anywhere}.job-name{min-width:0;flex:1}.actions{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}.empty{padding:18px;text-align:center;color:#55657a;font-weight:700}@media(max-width:720px){.form,.buttons{grid-template-columns:1fr}.form textarea,.form button,.buttons{grid-column:auto}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}.row{align-items:flex-start}.actions{margin-left:auto}}
  </style>
</head>
<body>
  <div class="topbar"><div>Latest Jobs Manager</div><div id="liveTime">Loading...</div></div>
  <header><h1>Latest Jobs Manager</h1><p>Latest jobs yahan se add/edit/delete karein.</p></header>
  <nav><a href="dashboard.html">Dashboard</a><a href="admin-links.html">Important Links</a><a href="admin-updates.html">Latest Updates</a><a href="admin-ads.html">Advertisements</a><a href="portal-items.html">Portal Items</a><a href="job-form.html">Latest Jobs Page</a><button onclick="logoutUser()">Logout</button></nav>
  <main>
    <section class="panel admin-info"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
    <section class="panel">
      <h2 id="formTitle">Add Job</h2>
      <div class="form">
        <input id="jobTitle" placeholder="Job Title जैसे SSC Steno 2026 Apply Online">
        <input id="jobType" placeholder="Job Type जैसे Online Form">
        <input id="jobStartDate" placeholder="Start Date जैसे 01 May 2026">
        <input id="jobLastDate" placeholder="Last Date जैसे 30 May 2026">
        <input id="jobQualification" placeholder="Qualification जैसे 12th Pass">
        <input id="jobLocation" placeholder="Location जैसे All India">
        <input id="jobApplyLink" type="url" placeholder="Apply Link https://...">
        <input id="jobDetailLink" type="url" placeholder="Official Detail / Notification Link https://...">
        <textarea id="jobPageContent" placeholder="Job detail page ke liye details likhein."></textarea>
        <div class="buttons">
          <button id="jobSubmitBtn" onclick="saveLatestJob()">Add Job</button>
          <button class="cancel" id="jobCancelBtn" onclick="cancelJobEdit()">Cancel Edit</button>
        </div>
      </div>
      <div id="jobStatus" class="status"></div>
    </section>
    <section class="panel"><h2>Saved Jobs</h2><div id="adminJobsList"><div class="empty">Loading...</div></div></section>
  </main>
  <script>function updateLiveTime(){liveTime.innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,push,set,update,remove,onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com",jobsRef=ref(db,"LatestJobs");let adminAllowed=false,editingJobId=null,latestJobsCache={};
    const accessTitle=document.getElementById("accessTitle"),adminEmailText=document.getElementById("adminEmailText"),formTitle=document.getElementById("formTitle"),jobTitle=document.getElementById("jobTitle"),jobType=document.getElementById("jobType"),jobStartDate=document.getElementById("jobStartDate"),jobLastDate=document.getElementById("jobLastDate"),jobQualification=document.getElementById("jobQualification"),jobLocation=document.getElementById("jobLocation"),jobApplyLink=document.getElementById("jobApplyLink"),jobDetailLink=document.getElementById("jobDetailLink"),jobPageContent=document.getElementById("jobPageContent"),jobSubmitBtn=document.getElementById("jobSubmitBtn"),jobCancelBtn=document.getElementById("jobCancelBtn"),jobStatus=document.getElementById("jobStatus"),adminJobsList=document.getElementById("adminJobsList");
    const escapeHTML=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const safeUrl=(v="#")=>/^https?:\/\//i.test(String(v||"").trim())?String(v).trim():"#";
    const formatAdminTime=(v)=>{const t=Number(v||0);return t?new Date(t).toLocaleString("hi-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"Time not saved"};
    const normalizeJob=(v)=>typeof v==="string"?{title:v,type:"Online Form",createdAt:0}:(v&&typeof v==="object"?v:{});
    const parseJobLastDate=(value="")=>{const text=String(value||"").trim();if(!text||/update soon/i.test(text))return null;const months={jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,sept:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};let m=text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(m)return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),23,59,59,999);m=text.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})$/);if(m)return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]),23,59,59,999);m=text.match(/^(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})$/);if(m&&months[m[2].toLowerCase()]!==undefined)return new Date(Number(m[3]),months[m[2].toLowerCase()],Number(m[1]),23,59,59,999);const parsed=new Date(text);return Number.isNaN(parsed.getTime())?null:new Date(parsed.getFullYear(),parsed.getMonth(),parsed.getDate(),23,59,59,999)};
    const shouldDeleteJobAfterLastDate=(lastDate)=>{const d=parseJobLastDate(lastDate);return Boolean(d&&Date.now()>d.getTime()+86400000)};
    const getForm=()=>({title:jobTitle.value.trim(),type:jobType.value.trim(),startDate:jobStartDate.value.trim(),lastDate:jobLastDate.value.trim(),qualification:jobQualification.value.trim(),location:jobLocation.value.trim(),applyLink:jobApplyLink.value.trim(),detailLink:jobDetailLink.value.trim(),pageContent:jobPageContent.value.trim()});
    const clearForm=()=>{jobTitle.value="";jobType.value="";jobStartDate.value="";jobLastDate.value="";jobQualification.value="";jobLocation.value="";jobApplyLink.value="";jobDetailLink.value="";jobPageContent.value=""};
    const cleanupExpiredJobs=()=>Object.entries(latestJobsCache).forEach(([id,data])=>{if(shouldDeleteJobAfterLastDate(data.lastDate))remove(ref(db,"LatestJobs/"+id)).catch(()=>{})});
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;accessTitle.innerText="Admin Access Verified";adminEmailText.innerText=user.email}else{location.href="index.html"}});
    window.saveLatestJob=()=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const form=getForm();if(!form.title){alert("Job Title zaroor bharen");return}if(form.applyLink&&!/^https?:\/\//i.test(form.applyLink)){alert("Apply Link http:// ya https:// se start hona chahiye");return}if(form.detailLink&&!/^https?:\/\//i.test(form.detailLink)){alert("Detail Link http:// ya https:// se start hona chahiye");return}jobStatus.innerText=editingJobId?"Updating...":"Saving...";const data={title:form.title,type:form.type||"Online Form",startDate:form.startDate||"Update Soon",lastDate:form.lastDate||"Update Soon",qualification:form.qualification||"Update Soon",location:form.location||"All India",applyLink:form.applyLink||"#",detailLink:form.detailLink||"#",pageContent:form.pageContent||"",updatedAt:Date.now()};const task=editingJobId?update(ref(db,"LatestJobs/"+editingJobId),data):set(push(jobsRef),{...data,createdAt:Date.now()});task.then(()=>{jobStatus.innerText=editingJobId?"Job Updated.":"Job Added.";window.cancelJobEdit()}).catch(e=>alert(e.message))};
    window.editLatestJob=(id)=>{const data=latestJobsCache[id];if(!data){alert("Job data nahi mila.");return}editingJobId=id;jobTitle.value=data.title||"";jobType.value=data.type||"";jobStartDate.value=data.startDate||"";jobLastDate.value=data.lastDate||"";jobQualification.value=data.qualification||"";jobLocation.value=data.location||"";jobApplyLink.value=data.applyLink&&data.applyLink!=="#"?data.applyLink:"";jobDetailLink.value=data.detailLink&&data.detailLink!=="#"?data.detailLink:"";jobPageContent.value=data.pageContent||"";formTitle.innerText="Edit Job";jobSubmitBtn.innerText="Update Job";jobCancelBtn.style.display="block";jobStatus.innerText="Edit mode active.";scrollTo({top:0,behavior:"smooth"})};
    window.cancelJobEdit=()=>{editingJobId=null;clearForm();formTitle.innerText="Add Job";jobSubmitBtn.innerText="Add Job";jobCancelBtn.style.display="none"};
    window.deleteLatestJob=(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}if(confirm("Ye job delete karni hai?"))remove(ref(db,"LatestJobs/"+id)).catch(e=>alert(e.message))};
    onValue(jobsRef,(snapshot)=>{adminJobsList.innerHTML="";latestJobsCache={};if(snapshot.exists()){const jobs=[];snapshot.forEach(child=>{const data=normalizeJob(child.val());if(shouldDeleteJobAfterLastDate(data.lastDate)){remove(ref(db,"LatestJobs/"+child.key)).catch(()=>{});return}latestJobsCache[child.key]=data;jobs.push({id:child.key,data})});jobs.sort((a,b)=>Number(b.data.createdAt||0)-Number(a.data.createdAt||0));jobs.forEach(({id,data})=>{adminJobsList.innerHTML+=`<div class="row"><div class="job-name"><strong>${escapeHTML(data.title||"Job Update")}</strong></div><div class="actions"><button class="edit" onclick="editLatestJob('${id}')">Edit</button><button class="delete" onclick="deleteLatestJob('${id}')">Delete</button></div></div>`});if(!jobs.length)adminJobsList.innerHTML='<div class="empty">Abhi koi latest job save nahi hai.</div>'}else{adminJobsList.innerHTML='<div class="empty">Abhi koi latest job save nahi hai.</div>'}});
    setInterval(cleanupExpiredJobs,3600000);
    window.logoutUser=()=>signOut(auth).then(()=>location.href="index.html");
  </script>
</body>
</html>
