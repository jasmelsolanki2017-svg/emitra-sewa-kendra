  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Devanagari',sans-serif}body{background:#f7fbff;color:#172033}.topbar{background:#043a76;color:white;padding:6px 3%;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}header{background:linear-gradient(135deg,#0057a8,#03224d);color:white;text-align:center;padding:16px 3%;border-bottom:3px solid #ff7a00}header h1{color:#ff7a00;font-size:clamp(22px,4vw,32px)}nav{background:white;padding:8px 3%;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}nav a,nav button{background:#0057a8;color:white;border:0;text-decoration:none;padding:7px 11px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}nav a:hover,nav button:hover{background:#ff7a00;color:#03224d}main{max-width:1040px;margin:auto;padding:16px 3% 34px}.panel{background:white;border:1px solid #d8e6f5;border-top:3px solid #ff7a00;border-radius:7px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.07)}.admin-info{text-align:center;background:#eaf4ff;border-left:4px solid #ff7a00;border-top:0}.panel h2{color:#0057a8;font-size:18px;margin-bottom:8px}.form{display:grid;grid-template-columns:1fr 1fr;gap:7px}.form input,.form textarea{width:100%;min-width:0;padding:8px 9px;border:1px solid #bdd0e5;border-radius:6px;font-size:12px}.form textarea,.form button,.photo-field{grid-column:1/-1}.photo-field{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:9px;border:1px dashed #8db9e8;border-radius:7px;background:#f5faff}.photo-field input{background:white}.photo-preview{width:96px;height:64px;border-radius:6px;border:1px solid #bdd0e5;background:white;object-fit:cover;display:none}button{border:0;border-radius:6px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer;background:#0057a8;color:white}button:disabled{opacity:.65;cursor:not-allowed}.delete{background:#d90000}.status{font-weight:800;color:#0057a8;margin-top:8px;font-size:12px}.row{background:#eaf4ff;border-left:3px solid #0057a8;border-radius:7px;padding:9px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.row strong{color:#0057a8}.row small{display:block;color:#4d5d72;font-size:11px;overflow-wrap:anywhere}.row-thumb{width:90px;height:62px;object-fit:cover;border-radius:6px;border:1px solid #bdd0e5;background:white;margin:0 8px 6px 0;float:left}.empty{padding:18px;text-align:center;color:#55657a;font-weight:700}@media(max-width:720px){.form{grid-template-columns:1fr}.form textarea,.form button,.photo-field{grid-column:auto}.photo-field{grid-template-columns:1fr}.photo-preview{width:100%;height:auto;max-height:180px}nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}nav a,nav button{white-space:nowrap}}
  </style>
<link rel="stylesheet" href="/site-theme.css">
<link rel="canonical" href="https://emitrawala.online/admin-ads.html">
</head>
<body>
  <div class="topbar"><div>Advertisement Manager</div><div id="liveTime">Loading...</div></div>
  <header><h1>Advertisement Manager</h1><p>Homepage par live advertisement yahan se add/delete karein.</p></header>
  <nav><a href="dashboard.html">Dashboard</a><a href="admin-links.html">Important Links</a><a href="admin-updates.html">Latest Updates</a><a href="premium-admin.html">Premium Post</a><a href="admin-auto-checker.html">Auto Job Checker</a><button onclick="logoutUser()">Logout</button></nav>
  <main>
    <section class="panel admin-info"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
    <section class="panel"><h2>Add Advertisement</h2><div class="form"><input id="adTitle" placeholder="Advertisement Title"><input id="adPhotoName" placeholder="Photo Name/No. जैसे 1 या admission-1"><input id="adLinkUrl" type="url" placeholder="Button Link https://... (optional)"><label class="photo-field"><input id="adPhotoFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif"><img id="adPhotoPreview" class="photo-preview" alt="Photo preview"></label><textarea id="adDescription" placeholder="Advertisement details"></textarea><button id="addAdButton" onclick="addAdvertisement()">Add Advertisement</button></div><div id="adStatus" class="status"></div></section>
    <section class="panel"><h2>Saved Advertisements</h2><div id="adminAdsList"><div class="empty">Loading...</div></div></section>
  </main>
  <script>function updateLiveTime(){liveTime.innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,push,set,remove,onValue,get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    import { createClient as createSupabaseClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com",adsRef=ref(db,"advertisements");let adminAllowed=false;
    const supabase=createSupabaseClient("https://wjzutgwmdrtlhmgebmua.supabase.co","sb_publishable_MbH1WNIeOHFkVqI13peLpg_TFgzfFjW"),adPhotoBucket="user-files";
    const accessTitle=document.getElementById("accessTitle"),adminEmailText=document.getElementById("adminEmailText"),adTitle=document.getElementById("adTitle"),adPhotoName=document.getElementById("adPhotoName"),adPhotoFile=document.getElementById("adPhotoFile"),adPhotoPreview=document.getElementById("adPhotoPreview"),adLinkUrl=document.getElementById("adLinkUrl"),adDescription=document.getElementById("adDescription"),adStatus=document.getElementById("adStatus"),addAdButton=document.getElementById("addAdButton"),adminAdsList=document.getElementById("adminAdsList");
    const escapeHTML=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const safeUrl=(v="#")=>/^https?:\/\//i.test(String(v||"").trim())?String(v).trim():"#";
    const formatDate=(v)=>v?new Date(Number(v)).toLocaleString("hi-IN"):"Not available";
    const safeFileName=(name="photo")=>String(name).trim().toLowerCase().replace(/\.[^.]+$/,"").replace(/[^a-z0-9_-]+/g,"-").replace(/^-+|-+$/g,"").slice(0,70)||"photo";
    const imageExt=(file)=>({ "image/jpeg":"jpg", "image/png":"png", "image/webp":"webp", "image/gif":"gif" }[file?.type]||"jpg");
    const getSupabasePublicUrl=(path)=>supabase.storage.from(adPhotoBucket).getPublicUrl(path).data.publicUrl;
    async function uploadAdPhoto(file, nameHint){
      if(!file)return null;
      if(!file.type.startsWith("image/"))throw new Error("Sirf image file upload karein.");
      if(file.size > 2 * 1024 * 1024)throw new Error("Photo 2MB se chhoti honi chahiye.");
      const path=`advertisements/${Date.now()}-${safeFileName(nameHint || file.name)}.${imageExt(file)}`;
      const { error } = await supabase.storage.from(adPhotoBucket).upload(path,file,{contentType:file.type,cacheControl:"3600",upsert:false});
      if(error)throw error;
      return { imageUrl:getSupabasePublicUrl(path), imagePath:path, imageBucket:adPhotoBucket, imageName:file.name, imageSize:file.size, storageProvider:"supabase" };
    }
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;accessTitle.innerText="Admin Access Verified";adminEmailText.innerText=user.email}else{location.replace("index.html")}});
    adPhotoFile.addEventListener("change",()=>{const file=adPhotoFile.files?.[0];if(!file){adPhotoPreview.style.display="none";adPhotoPreview.removeAttribute("src");return}adPhotoPreview.src=URL.createObjectURL(file);adPhotoPreview.style.display="block"});
    window.addAdvertisement=async()=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}const title=adTitle.value.trim(),photoName=adPhotoName.value.trim(),linkUrl=adLinkUrl.value.trim(),description=adDescription.value.trim(),file=adPhotoFile.files?.[0]||null;if(!title){alert("Advertisement title bharen");return}if(photoName&&!/^[a-zA-Z0-9_-]+$/.test(photoName)){alert("Photo Name me sirf letter/number, - ya _ rakhein");return}if(linkUrl&&!/^https?:\/\//i.test(linkUrl)){alert("Button Link http:// ya https:// se start hona chahiye");return}try{addAdButton.disabled=true;adStatus.innerText=file?"Photo Supabase par upload ho rahi hai...":"Saving...";const photoData=await uploadAdPhoto(file,photoName||title);adStatus.innerText="Advertisement save ho raha hai...";await set(push(adsRef),{title,description:description||"More details coming soon.",photoName:photoName||"",imageUrl:photoData?.imageUrl || (photoName?`${photoName}.jpeg`:"#"),imagePath:photoData?.imagePath || "",imageBucket:photoData?.imageBucket || "",imageName:photoData?.imageName || "",imageSize:photoData?.imageSize || 0,storageProvider:photoData?.storageProvider || "",linkUrl:linkUrl||"#",createdAt:Date.now()});adStatus.innerText="Advertisement Added.";adTitle.value="";adPhotoName.value="";adLinkUrl.value="";adDescription.value="";adPhotoFile.value="";adPhotoPreview.style.display="none";adPhotoPreview.removeAttribute("src")}catch(e){adStatus.innerText="Save nahi hua: "+e.message;alert(e.message)}finally{addAdButton.disabled=false}};
    window.deleteAdvertisement=async(id)=>{if(!adminAllowed){alert("Admin verify nahi hua.");return}if(!confirm("Ye advertisement delete karna hai?"))return;try{const itemRef=ref(db,"advertisements/"+id);const snapshot=await get(itemRef);const data=snapshot.val()||{};if(data.imagePath&&data.storageProvider==="supabase"){await supabase.storage.from(data.imageBucket||adPhotoBucket).remove([data.imagePath]).catch(()=>{})}await remove(itemRef);adStatus.innerText="Advertisement delete ho gaya."}catch(e){adStatus.innerText="Delete nahi hua: "+e.message;alert(e.message)}};
    onValue(adsRef,(snapshot)=>{adminAdsList.innerHTML="";if(snapshot.exists()){const rows=[];snapshot.forEach(child=>rows.push({id:child.key,...(child.val()||{})}));rows.sort((a,b)=>Number(b.createdAt||0)-Number(a.createdAt||0));rows.forEach(data=>{const thumb=safeUrl(data.imageUrl)!=="#"?`<img class="row-thumb" src="${safeUrl(data.imageUrl)}" alt="${escapeHTML(data.title||"Advertisement")}">`:"";adminAdsList.innerHTML+=`<div class="row"><div>${thumb}<strong>${escapeHTML(data.title||"Advertisement")}</strong><small>${escapeHTML(data.description||"")}</small><small>Photo: ${escapeHTML(data.imageName||data.photoName||data.imageUrl||"No Photo")}</small><small>Storage: ${escapeHTML(data.storageProvider==="supabase"?"Supabase":"Legacy/Manual")}</small><small>Link: <a href="${safeUrl(data.linkUrl)}" target="_blank" rel="noopener noreferrer">${escapeHTML(data.linkUrl||"#")}</a></small><small>Added: ${escapeHTML(formatDate(data.createdAt))}</small></div><button class="delete" onclick="deleteAdvertisement('${data.id}')">Delete</button></div>`})}else{adminAdsList.innerHTML='<div class="empty">Abhi koi advertisement save nahi hai.</div>'}});
    window.logoutUser=async()=>{adminAllowed=false;localStorage.removeItem("loginTime");try{await signOut(auth)}catch(error){console.warn("Admin logout failed",error)}location.replace("index.html")};
  </script>
<script src="/site-theme.js" defer></script>
