name: Update SEO post pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [seo-posts-update]
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-seo-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove deleted static post
        if: github.event.client_payload.deletedSlug != ''
        env:
          DELETED_POST_SLUG: ${{ github.event.client_payload.deletedSlug }}
        run: |
          if [[ "$DELETED_POST_SLUG" =~ ^[a-zA-Z0-9-]+$ ]]; then
            rm -rf "post/$DELETED_POST_SLUG"
          else
            echo "Skipped unsafe deletedSlug: $DELETED_POST_SLUG"
          fi

      - name: Generate canonical post pages and sitemaps
        run: npm run generate

      - name: SEO smoke test
        run: npm run seo:smoke

      - name: Verify public pages do not read Firebase
        run: npm run verify:firebase-public

      - name: Commit generated SEO files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated SEO post pages"
          file_pattern: "404.html sitemap.xml sitemap-jobs.xml sitemap-constitution.xml index.html latest-jobs.html admit-card.html result.html answer-key.html syllabus.html notification.html admission.html top-online-form.html important-links.html current-affairs.html constitution.html category-posts.js post/** constitution/** data/constitution/**"
