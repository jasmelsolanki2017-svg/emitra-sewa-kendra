name: Update SEO post pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [seo-posts-update]
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-seo-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate canonical post pages and sitemaps
        run: npm run sitemap

      - name: SEO smoke test
        run: npm run seo:smoke

      - name: Commit generated SEO files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated SEO post pages"
          file_pattern: "404.html sitemap.xml sitemap-jobs.xml index.html post/**"
