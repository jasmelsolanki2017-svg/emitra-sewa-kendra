<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Premium Post | E-MITRA WALA</title>
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="premium-post.css">
  <style>
    .generated-poster{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;background:linear-gradient(145deg,#06266b 0%,#0747b8 58%,#0a8d4a 100%);color:#fff}
    .generated-poster:before{content:"";position:absolute;inset:12px;border:2px solid rgba(255,255,255,.18);border-radius:6px}
    .generated-poster .poster-brand{position:absolute;left:14px;top:12px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:900;color:#ffcf28}
    .generated-poster .poster-brand img{width:22px;height:22px;object-fit:contain;background:#fff;border-radius:4px;padding:2px}
    .generated-poster strong{position:relative;z-index:1;max-width:220px;font-size:24px;line-height:1.06;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.22)}
    .generated-poster span{position:relative;z-index:1;margin-top:10px;color:#ffdf4c;font-size:13px;font-weight:900;text-transform:uppercase}
    .generated-poster small{position:relative;z-index:1;margin-top:14px;background:#fff;color:#0647a6;border-radius:4px;padding:6px 14px;font-weight:900}
    .preview-box .premium-card>ul,.preview-box .premium-card>.kv-grid{margin:14px}
    .preview-box .premium-hero{grid-template-columns:220px 1fr;gap:18px}
    .preview-box .hero-media{height:170px}
    .preview-box .premium-hero h1{font-size:28px}
  </style>
</head>
<body>
  <div class="premium-topbar"><div>Create Premium Post</div><div id="liveTime"></div></div>
  <header class="premium-header">
    <div class="premium-header-inner">
      <a class="brand" href="index.html"><img src="site-logo.png" alt="E-MITRA WALA"><span>E-MITRA WALA</span></a>
      <nav class="premium-nav"><a href="dashboard.html">Dashboard</a><a href="admin-jobs.html">Old Jobs Admin</a><a href="premium-post.html?slug=ctet-september-2026-online-form">Sample Link</a><button onclick="logoutUser()">Logout</button></nav>
    </div>
  </header>
  <main class="premium-shell">
    <section class="admin-panel"><h2 id="accessTitle">Admin Access Checking...</h2><p id="adminEmailText">Please wait...</p></section>
    <section class="admin-panel">
      <h2>Premium JSON Publisher</h2>
      <div class="admin-grid">
        <div>
          <textarea id="jsonInput" spellcheck="false"></textarea>
          <div class="admin-actions">
            <button onclick="validatePremiumPostFromInput()">Validate JSON</button>
            <button class="preview" onclick="previewPremiumPost()">Preview</button>
            <button class="publish" onclick="publishPremiumPost()">Publish</button>
            <button class="sample" onclick="loadSamplePremiumPost()">Load Sample</button>
          </div>
          <div id="adminStatus" class="status"></div>
          <a id="publicLink" class="small-link" href="#" target="_blank" rel="noopener noreferrer" hidden></a>
        </div>
        <div class="preview-box" id="previewBox"><div class="message">Preview yahan show hoga.</div></div>
      </div>
    </section>
  </main>
  <script>function updateLiveTime(){document.getElementById("liveTime").innerText=new Date().toLocaleString("hi-IN")}updateLiveTime();setInterval(updateLiveTime,1000)</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase,ref,set,get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    const firebaseConfig={apiKey:"AIzaSyCOAV-Dk_ZryXEawLxtcqMlRU6CPhPzpe8",authDomain:"my-website-73785.firebaseapp.com",databaseURL:"https://my-website-73785-default-rtdb.asia-southeast1.firebasedatabase.app/",projectId:"my-website-73785",storageBucket:"my-website-73785.firebasestorage.app",messagingSenderId:"854088341990",appId:"1:854088341990:web:3211d4ef9fe4b78d025e27"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),adminEmail="jasmelsolanki@gmail.com";
    const jsonInput=document.getElementById("jsonInput"),adminStatus=document.getElementById("adminStatus"),previewBox=document.getElementById("previewBox"),publicLink=document.getElementById("publicLink"),accessTitle=document.getElementById("accessTitle"),adminEmailText=document.getElementById("adminEmailText");
    let adminAllowed=false;
    const escapeHTML=(v="")=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    const isFilledValue=(v)=>!(v===null||v===undefined||v===""||(Array.isArray(v)&&!v.some(isFilledValue))||(typeof v==="object"&&!Array.isArray(v)&&!Object.values(v).some(isFilledValue)));
    function parsePremiumJSON(){const raw=jsonInput.value.trim();if(!raw)throw new Error("JSON textarea blank hai.");try{return JSON.parse(raw)}catch(error){throw new Error(`Invalid JSON: ${error.message}`)}}
    function generateSlug(title="premium-post"){return String(title||"premium-post").toLowerCase().trim().replace(/[^a-z0-9\u0900-\u097F]+/g,"-").replace(/^-+|-+$/g,"").slice(0,90)||`premium-post-${Date.now()}`}
    function validatePremiumPost(data){if(!data||typeof data!=="object"||Array.isArray(data))throw new Error("Premium post JSON ek object hona chahiye.");if(!isFilledValue(data.title))throw new Error("title required hai.");return true}
    function normalizePremiumPost(data){const now=Date.now();const slug=generateSlug(data.slug||data.title);return {...data,slug,status:data.status||"published",views:Number(data.views||0),createdAt:Number(data.createdAt||now),updatedAt:now}}
    async function savePremiumPost(data){if(!adminAllowed)throw new Error("Admin verify nahi hua.");validatePremiumPost(data);const post=normalizePremiumPost(data);const existing=await get(ref(db,`premiumPosts/${post.slug}`));if(existing.exists()&&existing.val().createdAt)post.createdAt=existing.val().createdAt;await set(ref(db,`premiumPosts/${post.slug}`),post);return post}
    const toTitle=(key="")=>String(key).replace(/([a-z])([A-Z])/g,"$1 $2").replace(/[-_]+/g," ").replace(/\b\w/g,(m)=>m.toUpperCase());
    const isSafeUrl=(url)=>{try{const u=new URL(String(url||""),location.href);return ["http:","https:"].includes(u.protocol)}catch{return false}};
    const safeUrl=(url)=>isSafeUrl(url)?String(url).trim():"";
    const previewValue=(value)=>{if(!isFilledValue(value))return"";if(Array.isArray(value))return `<ul>${value.filter(isFilledValue).map((item)=>`<li>${previewValue(item)}</li>`).join("")}</ul>`;if(typeof value==="object")return `<div class="kv-grid">${Object.entries(value).filter(([,v])=>isFilledValue(v)).map(([k,v])=>`<div class="kv-item"><span class="kv-label">${escapeHTML(toTitle(k))}</span><span class="kv-value">${previewValue(v)}</span></div>`).join("")}</div>`;return escapeHTML(value).replace(/\n/g,"<br>")};
    function renderHeroMedia(post){const image=safeUrl(post.heroImage||post.thumbnail);if(image)return `<div class="hero-media"><img src="${escapeHTML(image)}" alt="${escapeHTML(post.title)}"></div>`;const words=String(post.title||"Premium Update").split(/\s+/).filter(Boolean).slice(0,5).join(" ");return `<div class="hero-media generated-poster"><div class="poster-brand"><img src="site-logo.png" alt=""> E-MITRA WALA</div><strong>${escapeHTML(words||"Premium Update")}</strong><span>${escapeHTML(post.category||post.postType||"Verified Update")}</span><small>DOWNLOAD</small></div>`}
    function renderPremiumPost(data){const post=normalizePremiumPost(data);return `<section class="premium-hero">${renderHeroMedia(post)}<div class="hero-copy"><span class="pill">${escapeHTML(post.category||"Premium Update")}</span><span class="pill">${escapeHTML(post.postType||"Verified")}</span><h1>${escapeHTML(post.title)}</h1><p class="hero-short">${escapeHTML(post.shortInfo||"")}</p></div></section><div class="verified-strip"><span>E-MITRA WALA Verified Update</span><span>Slug: ${escapeHTML(post.slug)}</span></div>${Object.entries(post).filter(([k,v])=>!["title","slug","category","postType","shortInfo","thumbnail","heroImage","seo","status","createdAt","updatedAt","views"].includes(k)&&isFilledValue(v)).map(([k,v])=>renderCard(toTitle(k),previewValue(v))).join("")}`}
    function renderCard(title,content){return content?`<section class="premium-card"><h2>${escapeHTML(title)}</h2>${content}</section>`:""}
    const setStatus=(msg,type="")=>{adminStatus.className=`status ${type}`;adminStatus.innerText=msg};
    window.validatePremiumPostFromInput=()=>{try{const data=parsePremiumJSON();validatePremiumPost(data);setStatus("JSON valid hai. Preview ya Publish kar sakte hain.","success")}catch(error){setStatus(error.message,"error")}};
    window.previewPremiumPost=()=>{try{const data=parsePremiumJSON();validatePremiumPost(data);previewBox.innerHTML=renderPremiumPost(data);setStatus("Preview ready hai.","success")}catch(error){setStatus(error.message,"error")}};
    window.publishPremiumPost=async()=>{try{const data=parsePremiumJSON();setStatus("Publishing premium post...");const post=await savePremiumPost(data);const url=`${location.origin}${location.pathname.replace(/premium-admin\.html$/,"premium-post.html")}?slug=${encodeURIComponent(post.slug)}`;publicLink.href=url;publicLink.textContent=`Public premium post link: ${url}`;publicLink.hidden=false;setStatus("Premium post published ho gayi.","success")}catch(error){setStatus(error.message,"error")}};
    const samplePremiumPost={title:"CTET September 2026 Online Form",category:"Online Form",postType:"Teacher Eligibility Test",shortInfo:"CTET September 2026 ke online form, important dates, fee, eligibility aur official links ek premium verified layout me.",thumbnail:"https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1200&q=80",overview:{organization:"Central Board of Secondary Education",examName:"CTET September 2026",mode:"Online Application",location:"All India"},importantDates:{applicationStart:"01 August 2026",lastDate:"31 August 2026",feeLastDate:"31 August 2026",examDate:"September 2026"},applicationFee:[{category:"General / OBC",paperOne:"Rs. 1000",bothPapers:"Rs. 1200"},{category:"SC / ST / PwD",paperOne:"Rs. 500",bothPapers:"Rs. 600"}],ageLimit:{minimumAge:"No minimum age mentioned",maximumAge:"No maximum age mentioned",relaxation:"As per CTET rules"},eligibility:["Paper I: Senior Secondary with D.El.Ed / equivalent teacher training qualification.","Paper II: Graduation with B.Ed / D.El.Ed / equivalent qualification."],vacancy:{note:"CTET eligibility certificate exam hai, direct vacancy nahi hoti."},selectionProcess:["Online application","Admit card download","Computer based examination","Result / certificate"],examPattern:[{paper:"Paper I",level:"Class I to V",questions:"150",marks:"150"},{paper:"Paper II",level:"Class VI to VIII",questions:"150",marks:"150"}],syllabus:["Child Development and Pedagogy","Language I and II","Mathematics","Environmental Studies","Social Studies / Science"],documentsRequired:["Recent photo","Signature","Identity proof","Category certificate if applicable","Qualification documents"],howToApply:["Official website open karein.","CTET September 2026 Online Form link par click karein.","Registration details fill karein.","Photo/signature upload karein.","Fee payment karke final submit karein."],importantLinks:[{label:"Apply Online",url:"https://ctet.nic.in/"},{label:"Download Notification",url:"https://ctet.nic.in/"},{label:"Official Website",url:"https://ctet.nic.in/"},{label:"WhatsApp Channel",url:"https://whatsapp.com/channel/0029VaExample"},{label:"Telegram Channel",url:"https://t.me/example"}],faq:[{question:"CTET September 2026 online form kab start hoga?",answer:"Sample data ke hisab se online form 01 August 2026 se start hoga."},{question:"CTET ka official website kya hai?",answer:"CTET ka official website ctet.nic.in hai."}],relatedPosts:[{title:"CTET Admit Card 2026",slug:"ctet-admit-card-2026",shortInfo:"Admit card update"}],contentSections:[{title:"CTET September 2026 Details",content:"Yeh premium sample post hai jisme JSON ke basis par modern cards automatic render hote hain."}],customUnknownSection:{sampleField:"Unknown JSON key bhi card me render hoti hai.",anotherField:["Auto card","Auto list"]},seo:{metaTitle:"CTET September 2026 Online Form",metaDescription:"CTET September 2026 online form important dates, fee, eligibility and official links."}};
    window.loadSamplePremiumPost=()=>{jsonInput.value=JSON.stringify(samplePremiumPost,null,2);publicLink.hidden=true;setStatus("Sample premium JSON load ho gaya.","success")};
    window.parsePremiumJSON=parsePremiumJSON;window.validatePremiumPost=validatePremiumPost;window.generateSlug=generateSlug;window.savePremiumPost=savePremiumPost;window.renderPremiumPost=renderPremiumPost;window.renderCard=renderCard;
    onAuthStateChanged(auth,(user)=>{if(user&&user.email===adminEmail){adminAllowed=true;accessTitle.innerText="Admin Access Verified";adminEmailText.innerText=user.email}else{location.replace("index.html")}});
    window.logoutUser=async()=>{adminAllowed=false;localStorage.removeItem("loginTime");try{await signOut(auth)}catch(error){console.warn("Admin logout failed",error)}location.replace("index.html")};
    loadSamplePremiumPost();
  </script>
</body>
</html>
