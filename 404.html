<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://emitrawala.online/">
<title>Redirecting | E-MITRA WALA</title>
<script>
(function(){
  var path = window.location.pathname || "";
  var match = path.match(/\/post\/([^/?#]+)/);
  if(match && match[1]){
    var slug = encodeURIComponent(decodeURIComponent(match[1]));
    var canonical = window.location.origin + "/post/" + slug;
    var link = document.querySelector('link[rel="canonical"]');
    if(link){ link.setAttribute("href", canonical); }
    return;
  }
  window.location.replace("/index.html");
})();
</script>
</head>
<body>
<p>Page not found. <a href="/index.html">Go to E-MITRA WALA</a></p>
</body>
</html>
