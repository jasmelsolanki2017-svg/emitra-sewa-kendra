    };
    var normalizeSlug = function(value){
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    };
    var requestedKey = normalizeSlug(requestedSlug);
    var aliasTarget = postSlugAliases[requestedSlug] || postSlugAliases[requestedKey] || "";
    var matchedSlug = aliasTarget || knownPostSlugs.find(function(slug){
      var slugKey = normalizeSlug(slug);
      return slugKey === requestedKey || slugKey.indexOf(requestedKey + "-") === 0 || requestedKey.indexOf(slugKey + "-") === 0;
    });
    var slug = encodeURIComponent(matchedSlug || requestedSlug);
    var canonical = window.location.origin + "/post/" + slug;
    var link = document.querySelector('link[rel="canonical"]');
    if(link){ link.setAttribute("href", canonical); }
    if(matchedSlug && matchedSlug !== requestedSlug){
