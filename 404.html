<script>

      "rrb-alp-online-form-2026-11-127-posts-kfcxav": "rrb-alp-online-form-2026-11-127-posts"
    };
    var matchedSlug = postSlugAliases[requestedSlug] || knownPostSlugs.find(function(slug){
      return slug === requestedSlug || slug.indexOf(requestedSlug + "-") === 0 || requestedSlug.indexOf(slug + "-") === 0;
    });
    var slug = encodeURIComponent(matchedSlug || requestedSlug);
    var canonical = window.location.origin + "/post/" + slug;
    var link = document.querySelector('link[rel="canonical"]');
    if(link){ link.setAttribute("href", canonical); }
    if(matchedSlug && matchedSlug !== requestedSlug){
      window.location.replace(canonical);
      return;
    }
    if(!matchedSlug){
      window.location.replace(window.location.origin + "/job-detail.html?slug=" + encodeURIComponent(requestedSlug) + "&fallback=1");
    }
  }
})();
</script>

        registration.unregister().catch(function(){});
